<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Todos os empreendimentos — Zona Leste Lançamentos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,500;1,6..72,600&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'General Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  :root{
    --bg:#FFFFFF;--text:#111111;--muted:#6B6F76;--red:#9E1B1B;--gold:#C9A227;
    --glass:rgba(255,255,255,.20);--glass-brd:rgba(17,17,17,.05);
    --card:#FFFFFF;--card-brd:rgba(17,17,17,.09);--surface:#F6F6F4;
    --shadow:0 12px 40px rgba(17,17,17,.10);--ph1:#EDEBE6;--ph2:#E2DFD8;
  }
  [data-theme="dark"]{
    --bg:#0B0D10;--text:#FFFFFF;--muted:#A8ACB3;
    --glass:rgba(16,19,24,.18);--glass-brd:rgba(255,255,255,.08);
    --card:#12151A;--card-brd:rgba(255,255,255,.10);--surface:#111418;
    --shadow:0 16px 44px rgba(0,0,0,.55);--ph1:#1A1E24;--ph2:#22272E;
  }
  a{color:var(--red);text-decoration:none}
  a:hover{color:var(--gold)}
  .serif{font-family:'Newsreader',Georgia,serif;font-style:italic;font-weight:500}
  .reveal-init{opacity:0;transform:translateY(34px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);will-change:opacity,transform}
  .reveal-in{opacity:1 !important;transform:none !important}
  @keyframes zoomIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
  .card-hover:hover{transform:translateY(-6px);box-shadow:0 30px 60px -14px rgba(17,17,17,.5),0 10px 20px -8px rgba(17,17,17,.3)}
  .card-hover-lista:hover{transform:translateY(-3px);box-shadow:0 24px 50px -16px rgba(17,17,17,.45)}
  .btn-white:hover{background:var(--red) !important;color:#fff !important}
  .btn-outline-red:hover{background:var(--red) !important;color:#fff !important}
  .filter-opt:hover{background:var(--surface)}
  #loadOverlay{position:fixed;inset:0;background:var(--bg);z-index:99999;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px}
  select{-webkit-appearance:none;appearance:none}
</style>
</head>
<body>

<div id="loadOverlay">Carregando catálogo…</div>

<div id="root" data-theme="light" style="min-height:100vh;background:var(--bg);color:var(--text);display:none">
  <header style="position:sticky;top:0;z-index:50;background:transparent;padding-top:20px">
    <div style="display:flex;align-items:center;justify-content:center;padding:0 20px">
      <div style="display:flex;align-items:center;gap:6px;background:var(--glass);border:1px solid var(--glass-brd);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:8px 8px 8px 16px;border-radius:999px;box-shadow:0 8px 30px rgba(0,0,0,.12)">
        <a href="novo-index.html" style="display:flex;align-items:center;gap:9px;padding-right:6px">
          <span style="width:30px;height:30px;border-radius:8px;background:var(--red);display:grid;place-items:center;color:#fff;font-weight:700;font-size:14px">ZL</span>
          <span style="font-weight:600;font-size:15.5px;letter-spacing:-.01em;white-space:nowrap;color:var(--text)">Zona Leste</span>
        </a>
        <button id="themeBtn" data-act="toggleTheme" title="Alternar tema" style="width:38px;height:38px;border-radius:999px;border:none;background:var(--surface);cursor:pointer;color:var(--text);display:grid;place-items:center;font-size:15px">☾</button>
      </div>
    </div>
  </header>

  <main style="max-width:1320px;margin:0 auto;padding:40px 24px 90px">
    <div style="margin-bottom:8px">
      <h1 style="font-size:clamp(30px,4.4vw,48px);font-weight:600;letter-spacing:-.02em">Todos os <span class="serif" style="color:var(--red)">empreendimentos</span></h1>
      <p style="color:var(--muted);font-size:15.5px;margin-top:8px">Explore e filtre o catálogo completo da Zona Leste · <span id="listaCount" style="color:var(--text);font-weight:600">—</span> resultados.</p>
    </div>

    <div id="filterBar" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:28px 0 34px;padding-bottom:26px;border-bottom:1px solid var(--card-brd)"></div>

    <div id="panelRoot"></div>

    <div id="listaRoot"></div>
    <div id="zoomRoot"></div>
    <div id="emptyState" style="display:none;text-align:center;padding:70px 20px;color:var(--muted)">
      <div style="font-size:40px;margin-bottom:10px">◎</div>
      Nenhum empreendimento com esses filtros. <button data-act="clearFilters" style="background:none;border:none;color:var(--red);font-family:inherit;font-weight:600;font-size:15px;cursor:pointer;text-decoration:underline">Limpar filtros</button>
    </div>
  </main>
</div>

<script>
"use strict";
const SB='https://xmnggeptpwxsmcartyzt.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhtbmdnZXB0cHd4c21jYXJ0eXp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NjkzMzIsImV4cCI6MjA5NzE0NTMzMn0.2HWGvTAuEuzEHXcEbOr9t0gC1yc765lxQxk080EDmfg';
const H={apikey:KEY,Authorization:`Bearer ${KEY}`};
const STATUS_LABELS={lancamento:'Lançamento',na_planta:'Na planta',pronto:'Pronto p/ morar',breve_lancamento:'Breve lançamento',em_construcao:'Em construção'};
const STATUS_ORDER=['Lançamento','Breve lançamento','Em construção','Na planta','Pronto p/ morar'];
const STATUS_COLORS={'Lançamento':'#C9A227','Breve lançamento':'#C9A227','Em construção':'#3B5B8C','Na planta':'#7A4C6B','Pronto p/ morar':'#4C7A5B'};

const q=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=n=>'R$ '+Math.round(n).toLocaleString('pt-BR');
const PLACEHOLDER_IMG='data:image/svg+xml;utf8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10"><rect width="10" height="10" fill="%23EDEBE6"/></svg>');

let EMPS=[];
const state={ theme:'light', view:'grade', openFilter:null, panelOpen:false, zoomId:null,
  listaF:{ status:'', bairro:'', quartos:'', faixa:'', incorporadora:'', vagas:'', suites:'', area:'', mcmv:false, varanda:false, pertoMetro:false, amenities:[] } };

async function sbFetch(path,params={}){
  const u=new URL(`${SB}/rest/v1/${path}`);
  for(const[k,v]of Object.entries(params))u.searchParams.set(k,v);
  const r=await fetch(u,{headers:{...H,'Range':'0-9999'}});
  return r.json();
}
async function loadAll(){
  const[emps,tips]=await Promise.all([
    sbFetch('empreendimentos',{select:'*',ativo:'eq.true',limit:'500',order:'nome.asc'}),
    sbFetch('empreendimento_tipologias',{select:'empreendimento_id,quartos,vagas,area_m2,preco_a_partir',ativo:'eq.true',order:'empreendimento_id,area_m2.asc',limit:'3000'}),
  ]);
  let imgs=[],off=0;
  while(true){
    const batch=await sbFetch('empreendimento_imagens',{select:'empreendimento_id,url,tipo,ordem',ativo:'eq.true',order:'empreendimento_id,ordem',limit:'1000',offset:String(off)});
    imgs=imgs.concat(batch);
    if(batch.length<1000)break;
    off+=1000;
  }
  let lazer=[],off2=0;
  while(true){
    const batch=await sbFetch('lazer',{select:'empreendimento_id,item',limit:'1000',offset:String(off2)});
    lazer=lazer.concat(batch);
    if(batch.length<1000)break;
    off2+=1000;
  }
  return processEmps(emps,tips,imgs,lazer);
}
function pickImg(list,tipo){ const arr=list.filter(i=>i.tipo===tipo); return arr.length?arr[0].url:null; }

// Curated amenity groups built from the (messy, free-text) `lazer` table —
// several raw item names mean the same thing to a visitor (e.g. "Piscina",
// "Piscina adulto" and "Piscina infantil" should all just mean "Piscina" as
// a filter), so we group by pattern instead of using the raw strings.
const AMENITY_GROUPS=[
  {label:'Piscina', match:i=>/piscina/i.test(i)},
  {label:'Academia', match:i=>/academia|fitness|cross training|espaço funcional/i.test(i)},
  {label:'Salão de festas', match:i=>/sal[aã]o de festas/i.test(i)},
  {label:'Playground / kids', match:i=>/playground|brinquedoteca|espaço kids/i.test(i)},
  {label:'Espaço gourmet / churrasqueira', match:i=>/gourmet|churrasqueira/i.test(i)},
  {label:'Coworking', match:i=>/coworking/i.test(i)},
  {label:'Espaço pet', match:i=>/pet/i.test(i)},
  {label:'Bicicletário', match:i=>/bicicletário/i.test(i)},
  {label:'Salão de jogos', match:i=>/sal[aã]o de jogos/i.test(i)},
  {label:'Sauna', match:i=>/sauna/i.test(i)},
  {label:'Espaço delivery', match:i=>/delivery/i.test(i)},
  {label:'Mercadinho', match:i=>/mini\s*mercado|minimercado|mini\s*market/i.test(i)},
];

function processEmps(emps,tipsRaw,imgsRaw,lazerRaw){
  const tipsBy={}, imgsBy={}, lazerBy={};
  tipsRaw.forEach(t=>{ (tipsBy[t.empreendimento_id]=tipsBy[t.empreendimento_id]||[]).push(t); });
  imgsRaw.forEach(i=>{ (imgsBy[i.empreendimento_id]=imgsBy[i.empreendimento_id]||[]).push(i); });
  lazerRaw.forEach(l=>{ (lazerBy[l.empreendimento_id]=lazerBy[l.empreendimento_id]||[]).push(l.item||''); });

  return emps.map(e=>{
    const imgs=imgsBy[e.id]||[];
    const fachada=pickImg(imgs,'fachada')||pickImg(imgs,'perspectiva_3d')||null;
    let tips=(tipsBy[e.id]||[]).map(t=>({area:+t.area_m2||0,quartos:t.quartos??0,vagas:t.vagas??0,preco:+t.preco_a_partir||0})).filter(t=>t.preco>0);
    if(!tips.length) tips=[{area:+e.area_min_m2||0,quartos:e.tipo_min_quartos??0,vagas:0,preco:+e.preco_min||0}];
    const difsRaw=(e.diferenciais_apto||'').split(',').map(s=>s.trim()).filter(Boolean);
    const difs=difsRaw.length?difsRaw.slice(0,4):['Consultar diferenciais com o corretor'];
    const endereco=[e.logradouro,e.numero&&e.numero!=='S/N'?e.numero:null].filter(Boolean).join(', ')||(e.bairro_comercial||e.bairro||'Zona Leste');

    const rawItems=lazerBy[e.id]||[];
    const amenities=AMENITY_GROUPS.filter(g=>rawItems.some(i=>g.match(i))).map(g=>g.label);
    if(e.rooftop) amenities.push('Rooftop');

    return {
      id:e.id, nome:e.nome, bairro:e.bairro_comercial||e.bairro||'Zona Leste',
      incorporadora:e.incorporadora||'—', entrega:e.mes_entrega||'A definir',
      status:STATUS_LABELS[e.status]||e.status||'—',
      endereco, fachada, difs, tips:tips.sort((a,b)=>a.area-b.area),
      vagasMax:e.num_vagas_max??0, suitesMax:e.num_suites_max??0, areaMin:+e.area_min_m2||0,
      mcmv:!!e.enquadrado_mcmv, varanda:!!e.tem_varanda,
      pertoMetro: e.dist_metro_metros!=null && e.dist_metro_metros<=800,
      amenities,
    };
  });
}

function filtered(){
  const lf=state.listaF;
  return EMPS.filter(e=>{
    if(lf.status && e.status!==lf.status) return false;
    if(lf.bairro && e.bairro!==lf.bairro) return false;
    if(lf.incorporadora && e.incorporadora!==lf.incorporadora) return false;
    if(lf.quartos && !e.tips.some(t=> lf.quartos==='3' ? t.quartos>=3 : t.quartos===+lf.quartos)) return false;
    if(lf.faixa){
      const min=Math.min(...e.tips.map(t=>t.preco));
      if(lf.faixa==='a' && min>=500000) return false;
      if(lf.faixa==='b' && (min<500000||min>=800000)) return false;
      if(lf.faixa==='c' && (min<800000||min>=1200000)) return false;
      if(lf.faixa==='d' && min<1200000) return false;
    }
    if(lf.vagas && e.vagasMax < (lf.vagas==='3'?3:+lf.vagas)) return false;
    if(lf.suites && e.suitesMax < (lf.suites==='2'?2:+lf.suites)) return false;
    if(lf.area){
      if(lf.area==='a' && e.areaMin>=35) return false;
      if(lf.area==='b' && (e.areaMin<35||e.areaMin>=55)) return false;
      if(lf.area==='c' && (e.areaMin<55||e.areaMin>=80)) return false;
      if(lf.area==='d' && e.areaMin<80) return false;
    }
    if(lf.mcmv && !e.mcmv) return false;
    if(lf.varanda && !e.varanda) return false;
    if(lf.pertoMetro && !e.pertoMetro) return false;
    if(lf.amenities.length && !lf.amenities.every(a=>e.amenities.includes(a))) return false;
    return true;
  });
}
function statusBadge(status){
  const c=STATUS_COLORS[status]||'#6B6F76';
  return `position:absolute;left:12px;top:12px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:600;color:#fff;background:${c};box-shadow:0 2px 8px rgba(0,0,0,.3)`;
}

/* ---------------- ACTIONS ---------------- */
const ACTIONS={
  toggleTheme(){ state.theme=state.theme==='light'?'dark':'light'; q('root').dataset.theme=state.theme; q('themeBtn').textContent=state.theme==='light'?'☾':'☀'; },
  toggleFilter(t){ const key=t.dataset.filterKey; state.openFilter = state.openFilter===key?null:key; renderFilterBar(); },
  pickFilter(t){ const key=t.dataset.filterKey, val=t.dataset.filterVal; state.listaF={...state.listaF,[key]:val}; state.openFilter=null; renderAll(); },
  toggleBoolFilter(t){ const key=t.dataset.filterKey; state.listaF={...state.listaF,[key]:!state.listaF[key]}; renderAll(); },
  toggleAmenity(t){ const val=t.dataset.filterVal; const cur=state.listaF.amenities; state.listaF={...state.listaF, amenities: cur.includes(val)?cur.filter(a=>a!==val):[...cur,val]}; renderAll(); },
  clearFilters(){ state.listaF={status:'',bairro:'',quartos:'',faixa:'',incorporadora:'',vagas:'',suites:'',area:'',mcmv:false,varanda:false,pertoMetro:false,amenities:[]}; state.openFilter=null; renderAll(); },
  setGrade(){ state.view='grade'; renderAll(); },
  setLista(){ state.view='lista'; renderAll(); },
  openPanel(){ state.panelOpen=true; state.openFilter=null; renderAll(); },
  closePanel(){ state.panelOpen=false; renderAll(); },
  zoomOpen(t){ state.zoomId=t.dataset.id; renderZoom(); },
  zoomClose(){ state.zoomId=null; renderZoom(); },
  openDetail(t){ window.location.href='novo-index.html?emp='+encodeURIComponent(t.dataset.id); },
  noop(){},
};
document.addEventListener('click', e=>{
  const t=e.target.closest('[data-act]');
  // close any open quick-filter dropdown when clicking elsewhere
  if(state.openFilter && !e.target.closest('[data-filter-dropdown]')){ state.openFilter=null; renderFilterBar(); }
  if(!t) return;
  ACTIONS[t.dataset.act]?.(t,e);
});
document.addEventListener('change', e=>{
  const sel=e.target.closest('select[data-panelfilter]');
  if(!sel) return;
  state.listaF={...state.listaF,[sel.dataset.panelfilter]:sel.value};
  renderAll();
});

/* ---------------- RENDER ---------------- */
function bairroList(){ return [...new Set(EMPS.map(e=>e.bairro))].sort(); }
function incorporadoraList(){ return [...new Set(EMPS.map(e=>e.incorporadora))].filter(x=>x&&x!=='—').sort(); }
function activeFilterCount(){
  const lf=state.listaF;
  return ['status','bairro','incorporadora','quartos','faixa','vagas','suites','area'].filter(k=>lf[k]).length
    + (lf.mcmv?1:0) + (lf.varanda?1:0) + (lf.pertoMetro?1:0) + lf.amenities.length;
}

function renderFilterBar(){
  const lf=state.listaF, bairros=bairroList(), incorporadoras=incorporadoraList();
  const groupsDef=[
    {key:'status', name:'Status', values:STATUS_ORDER},
    {key:'bairro', name:'Bairro', values:bairros},
    {key:'incorporadora', name:'Incorporadora', values:incorporadoras},
  ];
  const filterCount=activeFilterCount();
  const btns=groupsDef.map(g=>{
    const active=!!lf[g.key];
    const open=state.openFilter===g.key;
    const options=[{label:'Todos',v:''},...g.values.map(v=>({label:v,v}))];
    return `
    <div style="position:relative" data-filter-dropdown>
      <button data-act="toggleFilter" data-filter-key="${g.key}" style="display:flex;align-items:center;gap:9px;font-family:inherit;font-size:14px;padding:10px 16px;border-radius:12px;cursor:pointer;border:1px solid ${active?'var(--red)':'var(--card-brd)'};background:var(--card);color:var(--text)">
        <span style="opacity:.6;font-size:12px;text-transform:uppercase;letter-spacing:.05em">${g.name}</span>
        <span style="font-weight:600">${esc(lf[g.key]||'Todos')}</span>
        <span style="margin-left:2px;transition:transform .2s;transform:${open?'rotate(180deg)':'rotate(0deg)'}">▾</span>
      </button>
      ${open?`<div style="position:absolute;top:calc(100% + 8px);left:0;z-index:20;min-width:220px;max-height:320px;overflow-y:auto;background:var(--card);border:1px solid var(--card-brd);border-radius:14px;box-shadow:0 18px 44px rgba(0,0,0,.22);padding:6px;display:flex;flex-direction:column">
        ${options.map(o=>`<button data-act="pickFilter" data-filter-key="${g.key}" data-filter-val="${esc(o.v)}" class="filter-opt" style="display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;text-align:left;font-family:inherit;font-size:14px;font-weight:500;padding:10px 12px;border-radius:9px;border:none;cursor:pointer;background:${lf[g.key]===o.v?'var(--surface)':'transparent'};color:var(--text)">
          <span>${esc(o.label)}</span>${lf[g.key]===o.v?'<span style="color:var(--red)">✓</span>':''}
        </button>`).join('')}
      </div>`:''}
    </div>`;
  }).join('');
  q('filterBar').innerHTML = `
    ${btns}
    ${filterCount?`<button data-act="clearFilters" style="background:none;border:none;color:var(--muted);font-family:inherit;font-size:13.5px;cursor:pointer;text-decoration:underline;padding:8px">Limpar</button>`:''}
    <div style="margin-left:auto;display:inline-flex;gap:4px;padding:4px;border-radius:12px;border:1px solid var(--card-brd);background:var(--card)">
      <button data-act="setGrade" title="Grade" style="width:36px;height:34px;border-radius:9px;border:none;cursor:pointer;display:grid;place-items:center;background:${state.view==='grade'?'var(--red)':'transparent'};color:${state.view==='grade'?'#fff':'var(--muted)'}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"></rect><rect x="14" y="3" width="7" height="7" rx="1.5"></rect><rect x="3" y="14" width="7" height="7" rx="1.5"></rect><rect x="14" y="14" width="7" height="7" rx="1.5"></rect></svg>
      </button>
      <button data-act="setLista" title="Lista" style="width:36px;height:34px;border-radius:9px;border:none;cursor:pointer;display:grid;place-items:center;background:${state.view==='lista'?'var(--red)':'transparent'};color:${state.view==='lista'?'#fff':'var(--muted)'}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13M3.5 6h.01M3.5 12h.01M3.5 18h.01"></path></svg>
      </button>
    </div>
    <button data-act="openPanel" style="display:inline-flex;align-items:center;gap:9px;font-family:inherit;font-size:14px;font-weight:600;padding:10px 18px;border-radius:12px;cursor:pointer;border:1px solid var(--card-brd);background:var(--card);color:var(--text)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 5h18M6 12h12M10 19h4"></path></svg>
      Filtros
      ${filterCount?`<span style="min-width:20px;height:20px;padding:0 6px;border-radius:999px;background:var(--red);color:#fff;font-size:12px;display:inline-grid;place-items:center">${filterCount}</span>`:''}
    </button>
  `;
}

function pillHtml(key, label, value, active){
  return `<button data-act="pickFilter" data-filter-key="${key}" data-filter-val="${esc(value)}" style="font-family:inherit;font-size:14px;font-weight:500;padding:9px 16px;border-radius:999px;cursor:pointer;border:1px solid ${active?'var(--red)':'var(--card-brd)'};background:${active?'var(--red)':'var(--card)'};color:${active?'#fff':'var(--text)'}">${esc(label)}</button>`;
}
function boolPillHtml(key, label, active){
  return `<button data-act="toggleBoolFilter" data-filter-key="${key}" style="font-family:inherit;font-size:14px;font-weight:500;padding:9px 16px;border-radius:999px;cursor:pointer;border:1px solid ${active?'var(--red)':'var(--card-brd)'};background:${active?'var(--red)':'var(--card)'};color:${active?'#fff':'var(--text)'}">${active?'✓ ':''}${esc(label)}</button>`;
}
function amenityPillHtml(label, active){
  return `<button data-act="toggleAmenity" data-filter-val="${esc(label)}" style="font-family:inherit;font-size:13.5px;font-weight:500;padding:8px 14px;border-radius:999px;cursor:pointer;border:1px solid ${active?'var(--gold)':'var(--card-brd)'};background:${active?'var(--gold)':'var(--card)'};color:${active?'#111':'var(--text)'}">${active?'✓ ':''}${esc(label)}</button>`;
}
function renderPanel(){

  const lf=state.listaF, bairros=bairroList(), incorporadoras=incorporadoraList();
  const groups=[
    {name:'Quartos', key:'quartos', opts:[{label:'Qualquer',v:''},{label:'1 quarto',v:'1'},{label:'2 quartos',v:'2'},{label:'3+ quartos',v:'3'}]},
    {name:'Faixa de preço', key:'faixa', opts:[{label:'Qualquer',v:''},{label:'até R$ 500 mil',v:'a'},{label:'R$ 500–800 mil',v:'b'},{label:'R$ 800 mil–1,2 mi',v:'c'},{label:'acima de R$ 1,2 mi',v:'d'}]},
    {name:'Metragem', key:'area', opts:[{label:'Qualquer',v:''},{label:'até 35 m²',v:'a'},{label:'35–55 m²',v:'b'},{label:'55–80 m²',v:'c'},{label:'acima de 80 m²',v:'d'}]},
    {name:'Vagas de garagem', key:'vagas', opts:[{label:'Qualquer',v:''},{label:'1+ vaga',v:'1'},{label:'2+ vagas',v:'2'},{label:'3+ vagas',v:'3'}]},
    {name:'Suítes', key:'suites', opts:[{label:'Qualquer',v:''},{label:'1+ suíte',v:'1'},{label:'2+ suítes',v:'2'}]},

    {name:'Bairro', key:'bairro', opts:[{label:'Todos',v:''},...bairros.map(v=>({label:v,v}))]},
    {name:'Incorporadora', key:'incorporadora', opts:[{label:'Todas',v:''},...incorporadoras.map(v=>({label:v,v}))]},
  ];
  const count=filtered().length;
  q('panelRoot').innerHTML = `
    <div data-act="closePanel" style="position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.45);backdrop-filter:blur(2px);display:flex;justify-content:flex-end">
      <div data-act="noop" style="width:min(440px,100%);height:100%;background:var(--bg);box-shadow:-18px 0 50px rgba(0,0,0,.3);display:flex;flex-direction:column">

function renderZoom(){
  if(state.zoomId==null){ q('zoomRoot').innerHTML=''; return; }
  const e=EMPS.find(x=>x.id===state.zoomId);
  if(!e){ q('zoomRoot').innerHTML=''; return; }
  const min=e.tips.reduce((a,t)=>t.preco<a.preco?t:a, e.tips[0]);
  const qmax=Math.max(...e.tips.map(t=>t.quartos)), qmin=Math.min(...e.tips.map(t=>t.quartos));
  const amax=Math.max(...e.tips.map(t=>t.area)), amin=Math.min(...e.tips.map(t=>t.area));
  const vagas=Math.max(...e.tips.map(t=>t.vagas));
  const chips=[
    '⌂ '+(qmax===0?'Studio':(qmin===qmax?qmax:qmin+'–'+qmax)+'q'),
    '⛃ '+vagas+' vaga(s)',
    '▱ '+(amin===amax?amin:amin+'–'+amax)+' m²',
    '⚑ '+e.entrega,
  ];
  const img=e.fachada||PLACEHOLDER_IMG;
  q('zoomRoot').innerHTML = `
    <div data-act="zoomClose" style="position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:32px">

        <img src="${esc(img)}" alt="${esc(e.nome)}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block">
        <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.3) 0%,rgba(0,0,0,0) 26%,rgba(0,0,0,.4) 54%,rgba(0,0,0,.9) 100%)"></div>
        <span style="${statusBadge(e.status)}">${esc(e.status)}</span>

}

function renderAll(){
  renderFilterBar();
  renderPanel();
  renderLista();
  renderZoom();
}

let io=null;
function setupReveal(){
  if(!io){
    io=new IntersectionObserver(entries=>{
      entries.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('reveal-in'); io.unobserve(en.target); } });
    },{threshold:0.12, rootMargin:'0px 0px -8% 0px'});
  }
  const groups=new Map();
  document.querySelectorAll('[data-reveal]').forEach(el=>{
    if(el.dataset.revealReady) return;
    el.dataset.revealReady='1';
    el.classList.add('reveal-init');
    const p=el.parentElement;
    const i=(groups.get(p)||0); groups.set(p,i+1);
    el.style.transitionDelay=(i*70)+'ms';
    io.observe(el);
  });
}

/* ---------------- BOOT ---------------- */
(async function boot(){
  try{
    EMPS = await loadAll();
  }catch(err){
    q('loadOverlay').textContent='Erro ao carregar o catálogo. Verifique a conexão e recarregue a página.';
    console.error(err);
    return;
  }

  // Pick up search params passed from the home page hero search
  // (?bairro=...&quartos=...&faixa=...) so the results already reflect
  // what the visitor searched for.
  const params=new URLSearchParams(window.location.search);
  const bairroP=params.get('bairro'), quartosP=params.get('quartos'), faixaP=params.get('faixa');
  if(bairroP) state.listaF.bairro=bairroP;
  if(quartosP) state.listaF.quartos=quartosP;
  if(faixaP) state.listaF.faixa=faixaP;

  renderAll();
  q('loadOverlay').style.display='none';
  q('root').style.display='block';
})();
</script>
