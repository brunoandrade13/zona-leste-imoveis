<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zona Leste Imóveis — Catálogo</title>
<style>
:root{--bg:#0f1117;--s:#181c27;--s2:#1f2438;--bd:#2a3050;--ac:#4f7dff;--ac2:#ff6b35;--w:#f5a623;--ok:#2ecc71;--t:#e8ecf4;--mt:#7a869e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}

/* HEADER */
header{background:linear-gradient(135deg,#0d1220,#1a2040);border-bottom:1px solid var(--bd);padding:18px 24px;position:sticky;top:0;z-index:100}
.hi{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-size:18px;font-weight:700;letter-spacing:-.3px}.logo span{color:var(--ac)}
.stats{display:flex;gap:24px;margin-left:auto}
.sn{font-size:22px;font-weight:700;color:var(--ac);line-height:1}
.sl{font-size:11px;color:var(--mt);text-transform:uppercase;letter-spacing:.5px}

/* CONTROLES */
.ctrl{max-width:1400px;margin:18px auto 0;padding:0 20px;display:flex;gap:10px;flex-wrap:wrap}
input[type=text]{flex:1;min-width:220px;background:var(--s);border:1px solid var(--bd);border-radius:8px;color:var(--t);padding:9px 14px;font-size:13px;outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:var(--ac)}
select{background:var(--s);border:1px solid var(--bd);border-radius:8px;color:var(--t);padding:9px 14px;font-size:13px;cursor:pointer;outline:none}
.fbtn{background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--t);padding:9px 14px;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.fbtn:hover{border-color:var(--ac);color:var(--ac)}.fbtn.on{background:var(--ac);border-color:var(--ac);color:#fff}
.cbar{max-width:1400px;margin:8px auto 0;padding:0 20px;font-size:11px;color:var(--mt)}

/* GRID */
.grid{max-width:1400px;margin:18px auto;padding:0 20px 50px;display:grid;gap:16px}
@media(min-width:600px){.grid{grid-template-columns:1fr 1fr}}
@media(min-width:900px){.grid{grid-template-columns:1fr 1fr 1fr}}
@media(min-width:1200px){.grid{grid-template-columns:repeat(4,1fr)}}

/* CARD */
.card{background:var(--s);border:1px solid var(--bd);border-radius:10px;overflow:hidden;cursor:pointer;transition:box-shadow .2s,border-color .2s,transform .15s;display:flex;flex-direction:column}
.card:hover{box-shadow:0 6px 28px rgba(79,125,255,.18);border-color:#3a4870;transform:translateY(-2px)}
.card.obs{border-color:var(--w)}.card.obs:hover{box-shadow:0 6px 28px rgba(245,166,35,.18)}
.card-img{width:100%;height:160px;object-fit:cover;display:block;background:var(--s2)}
.card-no-img{width:100%;height:160px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--mt)}
.card-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:5px}
.card-nome{font-size:13px;font-weight:600;line-height:1.3}
.card-sub{font-size:11px;color:var(--mt)}
.card-loc{font-size:11px;color:var(--mt)}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.b-n{background:rgba(79,125,255,.15);color:var(--ac)}
.b-w{background:rgba(255,107,53,.15);color:var(--ac2)}
.b-ok{background:rgba(46,204,113,.12);color:var(--ok)}
.b-y{background:rgba(245,166,35,.12);color:var(--w)}
.obs-prev{margin-top:6px;font-size:11px;color:var(--w);font-style:italic;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.loading{text-align:center;padding:60px;color:var(--mt);font-size:14px;grid-column:1/-1}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;overflow-y:auto;padding:20px 16px 40px}
.overlay.open{display:block}
.modal{background:var(--s);border:1px solid var(--bd);border-radius:14px;max-width:860px;margin:0 auto;overflow:hidden}

/* GALERIA NO MODAL */
.gallery{position:relative;background:#000;aspect-ratio:16/9;max-height:460px;overflow:hidden}
.gallery-main{width:100%;height:100%;object-fit:contain;display:block}
.gallery-no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--mt)}
.gallery-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.6);border:none;color:#fff;font-size:22px;cursor:pointer;padding:10px 14px;border-radius:8px;transition:background .2s;z-index:10}
.gallery-nav:hover{background:rgba(79,125,255,.8)}
.gallery-prev{left:10px}.gallery-next{right:10px}
.gallery-counter{position:absolute;bottom:10px;right:12px;background:rgba(0,0,0,.65);color:#fff;font-size:11px;padding:3px 10px;border-radius:20px}
.thumbs{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;background:var(--s2);border-bottom:1px solid var(--bd)}
.thumbs::-webkit-scrollbar{height:4px}.thumbs::-webkit-scrollbar-track{background:var(--s2)}.thumbs::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.thumb{width:68px;height:48px;object-fit:cover;border-radius:5px;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:border-color .15s,opacity .15s;opacity:.6}
.thumb.active{border-color:var(--w);opacity:1}
.thumb:hover{opacity:1}

/* MODAL BODY */
.modal-body{padding:20px 22px;display:flex;flex-direction:column;gap:18px}
.modal-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.modal-title{font-size:18px;font-weight:700;line-height:1.25}
.modal-close{background:var(--s2);border:1px solid var(--bd);color:var(--mt);border-radius:8px;padding:4px 12px;font-size:20px;cursor:pointer;flex-shrink:0;line-height:1.2}
.modal-close:hover{color:var(--t);border-color:var(--ac)}
.modal-meta{font-size:12px;color:var(--mt);margin-top:4px}

/* SEÇÕES DE INFO */
.info-sec{border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.info-sec-title{background:var(--s2);padding:8px 14px;font-size:11px;font-weight:700;color:var(--ac);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--bd)}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:0}
.info-item{padding:9px 14px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd)}
.info-item:last-child{border-right:none}
.info-label{font-size:10px;color:var(--mt);margin-bottom:2px}
.info-value{font-size:12.5px;font-weight:600;color:var(--t);word-break:break-word}
.info-value.ok{color:var(--ok)}.info-value.warn{color:var(--ac2)}.info-value.ac{color:var(--ac)}.info-value.y{color:var(--w)}
.info-value.sm{font-size:11.5px;font-weight:400}
.info-full{grid-column:1/-1;padding:9px 14px;border-bottom:1px solid var(--bd)}

/* OBSERVAÇÃO */
.obs-section{border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.obs-section-title{background:rgba(245,166,35,.08);border-bottom:1px solid var(--bd);padding:8px 14px;font-size:11px;font-weight:700;color:var(--w);text-transform:uppercase;letter-spacing:.6px}
.obs-ta{width:100%;background:var(--bg);border:none;border-bottom:1px solid var(--bd);color:var(--t);padding:10px 14px;font-size:13px;min-height:75px;resize:vertical;outline:none;font-family:inherit;line-height:1.6}
.obs-ta::placeholder{color:#3a4a66}
.obs-ta:focus{border-bottom-color:var(--w)}
.obs-footer{display:flex;gap:8px;padding:8px 14px;align-items:center}
.btn-save{background:var(--ac);color:#fff;border:none;border-radius:7px;padding:7px 18px;font-size:12px;font-weight:600;cursor:pointer}
.btn-save:disabled{opacity:.4}
.btn-clr{background:var(--s2);color:var(--mt);border:1px solid var(--bd);border-radius:7px;padding:7px 12px;font-size:12px;cursor:pointer}
.btn-clr:hover{border-color:#e74c3c;color:#e74c3c}
.save-st{font-size:11px;color:var(--mt)}.save-st.ok{color:var(--ok)}.save-st.er{color:#e74c3c}

/* LINKS */
.links-row{display:flex;gap:8px;flex-wrap:wrap;padding:10px 14px}
.lnk{display:inline-flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:6px 12px;font-size:12px;color:var(--ac);text-decoration:none;transition:border-color .2s}
.lnk:hover{border-color:var(--ac)}
</style>
</head>
<body>
<header>
  <div class="hi">
    <div class="logo">Zona Leste <span>Imóveis</span></div>
    <div style="font-size:11px;color:var(--mt)">Catálogo de auditoria · clique no card para ver detalhes</div>
    <div class="stats">
      <div><div class="sn" id="sT">—</div><div class="sl">total</div></div>
      <div><div class="sn" id="sO" style="color:var(--w)">—</div><div class="sl">c/ obs</div></div>
      <div><div class="sn" id="sS">—</div><div class="sl">exibidos</div></div>
    </div>
  </div>
</header>

<div class="ctrl">
  <input type="text" id="qS" placeholder="🔍  Nome, construtora, bairro..." oninput="flt()">
  <select id="qO" onchange="flt()">
    <option value="">Todos</option>
    <option value="com">Com observação</option>
    <option value="sem">Sem observação</option>
  </select>
  <button class="fbtn" id="bP" onclick="tgl('p')">📷 &lt;6 fotos</button>
  <button class="fbtn" id="bF" onclick="tgl('f')">🏢 Sem fachada</button>
</div>
<div class="cbar" id="cB"></div>
<div class="grid" id="grid"><div class="loading">Carregando empreendimentos…</div></div>

<!-- MODAL -->
<div class="overlay" id="ovl" onclick="if(event.target===this)closeM()">
  <div class="modal" id="modalBox"></div>
</div>

<script>
const SB='https://xmnggeptpwxsmcartyzt.supabase.co';
const K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhtbmdnZXB0cHd4c21jYXJ0eXp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NjkzMzIsImV4cCI6MjA5NzE0NTMzMn0.2HWGvTAuEuzEHXcEbOr9t0gC1yc765lxQxk080EDmfg';
const H={apikey:K,Authorization:'Bearer '+K};
let all=[],af={p:false,f:false};
let curImgs=[],curIdx=0;

function e(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function v(x){return (x===null||x===undefined||x==='')?'—':x;}
function brl(n){return n?'R$ '+Number(n).toLocaleString('pt-BR'):'—';}
function bool(b){return b===true?'<span style="color:var(--ok)">✓ Sim</span>':b===false?'<span style="color:var(--mt)">Não</span>':'—';}
function row(l,val,cls){val=v(val);if(val==='—')return '';return '<div class="info-item"><div class="info-label">'+e(l)+'</div><div class="info-value'+(cls?' '+cls:'')+'">'+val+'</div></div>';}
function rowB(l,val){return '<div class="info-item"><div class="info-label">'+e(l)+'</div><div class="info-value">'+bool(val)+'</div></div>';}
function rowFull(l,val){val=v(val);if(val==='—')return '';return '<div class="info-full"><div class="info-label">'+e(l)+'</div><div class="info-value sm">'+e(val)+'</div></div>';}

async function load(){
  const [re,ri,rc]=await Promise.all([
    fetch(SB+'/rest/v1/empreendimentos?ativo=eq.true&select=*&order=nome',{headers:H}),
    fetch(SB+'/rest/v1/empreendimento_imagens?ativo=eq.true&select=empreendimento_id,tipo',{headers:{...H,'Range':'0-9999'}}),
    fetch(SB+'/rest/v1/empreendimento_imagens?ativo=eq.true&tipo=in.(fachada,perspectiva_3d)&select=empreendimento_id,url&order=ordem',{headers:{...H,'Range':'0-9999'}})
  ]);
  const emps=await re.json(),imgs=await ri.json(),caps=await rc.json();
  if(!Array.isArray(emps)){document.getElementById('grid').innerHTML='<div class="loading" style="color:#e74c3c">Erro: '+(emps.message||'')+'</div>';return;}
  const st={},cm={};
  imgs.forEach(i=>{if(!st[i.empreendimento_id])st[i.empreendimento_id]={t:0,f:0};st[i.empreendimento_id].t++;if(['fachada','perspectiva_3d'].includes(i.tipo))st[i.empreendimento_id].f++;});
  caps.forEach(c=>{if(!cm[c.empreendimento_id])cm[c.empreendimento_id]=c.url;});
  all=emps.map(emp=>({...emp,total:st[emp.id]?.t||0,fach:st[emp.id]?.f||0,capa:cm[emp.id]||null}));
  document.getElementById('sT').textContent=all.length;
  render();
}

function render(){
  const q=document.getElementById('qS').value.toLowerCase();
  const fo=document.getElementById('qO').value;
  const sh=all.filter(emp=>{
    if(q&&!(emp.nome+' '+emp.construtora+' '+(emp.bairro||'')+' '+(emp.bairro_comercial||'')).toLowerCase().includes(q))return false;
    if(fo==='com'&&!(emp.observacao&&emp.observacao.trim()))return false;
    if(fo==='sem'&&(emp.observacao&&emp.observacao.trim()))return false;
    if(af.p&&emp.total>=6)return false;
    if(af.f&&emp.fach>0)return false;
    return true;
  });
  document.getElementById('sO').textContent=all.filter(emp=>emp.observacao&&emp.observacao.trim()).length;
  document.getElementById('sS').textContent=sh.length;
  document.getElementById('cB').textContent='Mostrando '+sh.length+' de '+all.length+' empreendimentos';
  const g=document.getElementById('grid');
  if(!sh.length){g.innerHTML='<div class="loading">Nenhum resultado</div>';return;}
  g.innerHTML=sh.map(emp=>{
    const ho=emp.observacao&&emp.observacao.trim();
    const img=emp.capa?'<img class="card-img" src="'+e(emp.capa)+'" loading="lazy" alt="">':'<div class="card-no-img">🏗</div>';
    const bn=emp.total<6?'<span class="badge b-w">⚠ '+emp.total+' fotos</span>':'<span class="badge b-n">'+emp.total+' fotos</span>';
    const bf=emp.fach===0?'<span class="badge b-w">Sem fachada</span>':'<span class="badge b-ok">🏢 '+emp.fach+'</span>';
    const bp=emp.programa?'<span class="badge b-y">'+e(emp.programa)+'</span>':'';
    const op=ho?'<div class="obs-prev">💬 '+e(emp.observacao.trim())+'</div>':'';
    return '<div class="card'+(ho?' obs':'')+'" onclick="openM(\''+emp.id+'\')">'+img
      +'<div class="card-body"><div class="card-nome">'+e(emp.nome)+'</div>'
      +'<div class="card-sub">'+e(emp.construtora||'')+'</div>'
      +'<div class="card-loc">📍 '+e(emp.bairro_comercial||emp.bairro||'—')+'</div>'
      +'<div class="card-badges">'+bn+bf+bp+'</div>'+op+'</div></div>';
  }).join('');
}

function flt(){render();}
function tgl(k){af[k]=!af[k];document.getElementById(k==='p'?'bP':'bF').classList.toggle('on',af[k]);render();}

// ── MODAL ──
async function openM(id){
  const emp=all.find(x=>x.id===id);
  if(!emp)return;
  document.getElementById('ovl').classList.add('open');
  document.getElementById('modalBox').innerHTML='<div style="padding:30px;text-align:center;color:var(--mt)">Carregando…</div>';
  document.getElementById('ovl').scrollTop=0;

  const r=await fetch(SB+'/rest/v1/empreendimento_imagens?empreendimento_id=eq.'+id+'&ativo=eq.true&select=url,tipo,ordem&order=tipo,ordem',{headers:H});
  curImgs=await r.json();
  curIdx=0;

  buildModal(emp);
}

function buildModal(emp){
  const id=emp.id;
  const nFach=curImgs.filter(i=>['fachada','perspectiva_3d'].includes(i.tipo)).length;
  const nLaz=curImgs.filter(i=>i.tipo==='lazer').length;
  const nInt=curImgs.filter(i=>i.tipo==='interiores').length;
  const nPla=curImgs.filter(i=>i.tipo==='planta').length;

  // Galeria
  const hasImgs=curImgs.length>0;
  const galeria=hasImgs?`
    <div class="gallery">
      <img class="gallery-main" id="galMain" src="${e(curImgs[0].url)}" alt="">
      <button class="gallery-nav gallery-prev" onclick="navImg(-1)">‹</button>
      <button class="gallery-nav gallery-next" onclick="navImg(1)">›</button>
      <div class="gallery-counter" id="galCnt">1 / ${curImgs.length}</div>
    </div>
    <div class="thumbs" id="thumbRow">
      ${curImgs.map((i,idx)=>'<img class="thumb'+(idx===0?' active':'')+'" src="'+e(i.url)+'" loading="lazy" onclick="goImg('+idx+')" title="'+i.tipo+' #'+i.ordem+'"  alt="">').join('')}
    </div>`
    :'<div class="gallery"><div class="gallery-no-img">📷</div></div>';

  // Seções de informação
  const secImgs=`<div class="info-sec">
    <div class="info-sec-title">📷 Imagens (${curImgs.length} ativas)</div>
    <div class="info-grid">
      ${row('Total ativo',emp.total+(emp.total<6?' ⚠':''),emp.total<6?'warn':'ok')}
      ${row('Fachada / 3D',nFach,nFach===0?'warn':'ac')}
      ${row('Lazer',nLaz,'ac')}
      ${row('Interiores',nInt,'ac')}
      ${row('Plantas',nPla,'ac')}
    </div></div>`;

  const quartos=emp.tipo_min_quartos?((emp.tipo_min_quartos===emp.tipo_max_quartos?emp.tipo_min_quartos:emp.tipo_min_quartos+'–'+emp.tipo_max_quartos)+'Q'):'—';
  const area=emp.area_min_m2?((emp.area_min_m2===emp.area_max_m2?emp.area_min_m2:emp.area_min_m2+'–'+emp.area_max_m2)+'m²'):'—';
  const vagas=emp.num_vagas_min!=null?((emp.num_vagas_min===emp.num_vagas_max?emp.num_vagas_min:emp.num_vagas_min+'–'+emp.num_vagas_max)+' vaga(s)'):'—';

  const secCarac=`<div class="info-sec">
    <div class="info-sec-title">🏠 Apartamento</div>
    <div class="info-grid">
      ${row('Área',area)}${row('Quartos',quartos)}
      ${row('Suítes (máx)',v(emp.num_suites_max))}${row('Banheiros (máx)',v(emp.num_banheiros_max))}
      ${row('Vagas',vagas)}${rowB('Varanda',emp.tem_varanda)}
      ${rowB('Studio',emp.tem_studio)}${rowB('Depósito',emp.tem_deposito)}
      ${rowB('Armário embutido',emp.tem_armario_embutido)}${rowB('Infra ar-cond.',emp.infra_ar_condicionado)}
      ${rowB('Aquec. gás central',emp.aquecimento_central_gas)}${rowB('Fechadura biométrica',emp.fechadura_biometrica)}
      ${rowB('Tomada USB',emp.tomada_usb)}${rowB('Persiana enrolar',emp.persiana_enrolar)}
      ${rowB('Vaso dual flush',emp.vaso_dual_flush)}${row('Metais',v(emp.marca_metais))}
      ${row('Piso',v(emp.acabamento_piso))}${row('Banheiro acabamento',v(emp.acabamento_banheiro))}
      ${rowFull('Diferenciais do apto',emp.diferenciais_apto)}
    </div></div>`;

  const secPrecos=`<div class="info-sec">
    <div class="info-sec-title">💰 Preços</div>
    <div class="info-grid">
      ${row('Preço mín.',brl(emp.preco_min))}${row('Preço máx.',brl(emp.preco_max))}
      ${row('R$/m² mín.',brl(emp.preco_m2_min))}${row('R$/m² máx.',brl(emp.preco_m2_max))}
      ${row('Condomínio est.',brl(emp.condominio_estimado))}${row('IPTU est./ano',brl(emp.iptu_estimado_anual))}
      ${rowB('Aceita FGTS',emp.aceita_fgts)}${rowB('Financiamento',emp.aceita_financiamento)}
      ${rowFull('Bancos',emp.bancos_financiamento)}
      ${rowB('MCMV',emp.enquadrado_mcmv)}${row('Faixa MCMV',v(emp.faixa_mcmv))}
    </div></div>`;

  const secEmp=`<div class="info-sec">
    <div class="info-sec-title">🏗 Empreendimento</div>
    <div class="info-grid">
      ${row('Total unidades',v(emp.total_unidades))}${row('Torres',v(emp.num_torres))}
      ${row('Pavimentos',v(emp.num_pavimentos))}${row('Aptos/andar',v(emp.aptos_por_andar))}
      ${row('Elevadores',v(emp.num_elevadores))}${row('Terreno',emp.area_terreno_m2?emp.area_terreno_m2+'m²':'—')}
      ${row('Lazer',emp.area_lazer_m2?emp.area_lazer_m2+'m²':'—')}${row('Fase obra',emp.fase_obra_pct!=null?emp.fase_obra_pct+'%':'—')}
      ${rowB('Rooftop',emp.rooftop)}${rowB('Heliponto',emp.heliponto)}
      ${rowB('Piscina coberta',emp.piscina_coberta)}${rowB('Tour virtual',emp.tem_tour_virtual)}
      ${row('Cert. ambiental',v(emp.certificacao_ambiental))}${row('Padrão',v(emp.padrao))}
      ${row('Arquiteto',v(emp.arquiteto))}${row('Paisagista',v(emp.paisagista))}
      ${row('Decorador',v(emp.decorador))}${rowFull('Sistema construtivo',emp.sistema_construtivo)}
    </div></div>`;

  const secTimeline=`<div class="info-sec">
    <div class="info-sec-title">📅 Linha do Tempo</div>
    <div class="info-grid">
      ${row('Status',v(emp.status))}${row('Etapa',v(emp.estagio_linha_tempo))}
      ${row('Lançamento',v(emp.data_lancamento))}${row('Início obras',v(emp.data_inicio_obras))}
      ${row('Previsão entrega',v(emp.mes_entrega||emp.previsao_entrega))}
      ${row('Atualização',v(emp.data_atualizacao_anuncio))}
    </div></div>`;

  const secLoc=`<div class="info-sec">
    <div class="info-sec-title">📍 Localização</div>
    <div class="info-grid">
      ${row('Bairro',v(emp.bairro))}${row('Bairro comercial',v(emp.bairro_comercial))}
      ${row('Subprefeitura',v(emp.subprefeitura))}${row('CEP',v(emp.cep))}
      ${row('Metrô',emp.nome_metro_proximo?(emp.nome_metro_proximo+(emp.dist_metro_metros?' ('+emp.dist_metro_metros+'m)':'')):'—')}
      ${row('Linha metrô',v(emp.linha_metro))}
      ${row('Ônibus',emp.ponto_onibus_proximo?(emp.ponto_onibus_proximo+(emp.dist_onibus_metros?' ('+emp.dist_onibus_metros+'m)':'')):'—')}
      ${row('Shopping',emp.nome_shopping_proximo?(emp.nome_shopping_proximo+(emp.dist_shopping_metros?' ('+emp.dist_shopping_metros+'m)':'')):'—')}
      ${rowFull('Endereço',emp.logradouro?(emp.logradouro+(emp.numero?', '+emp.numero:'')):'—')}
      ${rowFull('Pontos de interesse',emp.pontos_interesse)}
    </div></div>`;

  const secLegal=`<div class="info-sec">
    <div class="info-sec-title">📋 Dados Legais</div>
    <div class="info-grid">
      ${row('Cód. referência',v(emp.codigo_referencia))}${row('Incorporadora',v(emp.incorporadora))}
      ${rowFull('CNPJ',emp.cnpj_incorporadora)}
      ${rowFull('Registro incorporação',emp.registro_incorporacao)}
      ${rowFull('Cartório RI',emp.cartorio_ri)}
      ${rowFull('Fonte dos dados',emp.fonte_dados)}
    </div></div>`;

  const secNotes=emp.observacoes?`<div class="info-sec">
    <div class="info-sec-title">📝 Notas técnicas</div>
    <div class="info-grid">${rowFull('',emp.observacoes)}</div></div>`:'';

  // Links
  const linksList=[
    ['apto.vc',emp.url_apto_vc],['Lopes',emp.url_lopes],['ZAP',emp.url_zap],
    ['Viva Real',emp.url_vivareal],['Segundo Imóvel',emp.url_segundo_imovel],
    ['YouTube',emp.url_video_youtube],
  ].filter(([,u])=>u&&!u.includes('google.com/search'));
  const secLinks=linksList.length?`<div class="info-sec">
    <div class="info-sec-title">🔗 Links</div>
    <div class="links-row">${linksList.map(([l,u])=>'<a class="lnk" href="'+e(u)+'" target="_blank">🔗 '+e(l)+'</a>').join('')}</div>
    </div>`:'';

  // Observação de auditoria
  const secObs=`<div class="obs-section">
    <div class="obs-section-title">💬 Observação de auditoria</div>
    <textarea class="obs-ta" id="obsTA" placeholder="Descreva o que está errado ou precisa ser corrigido neste empreendimento…">${e(emp.observacao||'')}</textarea>
    <div class="obs-footer">
      <button class="btn-save" id="btnSv" onclick="saveObs('${id}')">💾 Salvar</button>
      <button class="btn-clr" onclick="clrObs('${id}')">Limpar</button>
      <span class="save-st" id="stMsg"></span>
    </div></div>`;

  document.getElementById('modalBox').innerHTML=`
    ${galeria}
    <div class="modal-body">
      <div class="modal-top">
        <div>
          <div class="modal-title">${e(emp.nome)}</div>
          <div class="modal-meta">${e(emp.construtora||'')}${emp.selo?' · '+e(emp.selo):''} · 📍 ${e(emp.bairro_comercial||emp.bairro||'—')} · ${e(emp.cidade||'SP')}/${e(emp.estado||'SP')}</div>
        </div>
        <button class="modal-close" onclick="closeM()">×</button>
      </div>
      ${secObs}
      ${secImgs}
      ${secCarac}
      ${secPrecos}
      ${secEmp}
      ${secTimeline}
      ${secLoc}
      ${secLegal}
      ${secNotes}
      ${secLinks}
    </div>`;
}

function navImg(dir){
  if(!curImgs.length)return;
  curIdx=(curIdx+dir+curImgs.length)%curImgs.length;
  goImg(curIdx);
}
function goImg(idx){
  curIdx=idx;
  document.getElementById('galMain').src=curImgs[idx].url;
  document.getElementById('galCnt').textContent=(idx+1)+' / '+curImgs.length;
  document.querySelectorAll('.thumb').forEach((t,i)=>t.classList.toggle('active',i===idx));
  const tr=document.getElementById('thumbRow');
  if(tr){const th=tr.querySelectorAll('.thumb')[idx];if(th)th.scrollIntoView({inline:'center',behavior:'smooth'});}
}

function closeM(){document.getElementById('ovl').classList.remove('open');}

async function saveObs(id){
  const txt=document.getElementById('obsTA').value.trim();
  const btn=document.getElementById('btnSv');
  const st=document.getElementById('stMsg');
  btn.disabled=true;btn.textContent='Salvando…';
  try{
    const r=await fetch(SB+'/rest/v1/empreendimentos?id=eq.'+id,{method:'PATCH',headers:{...H,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify({observacao:txt||null})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const emp=all.find(x=>x.id===id);
    if(emp)emp.observacao=txt;
    document.getElementById('sO').textContent=all.filter(x=>x.observacao&&x.observacao.trim()).length;
    const card=document.querySelector('.card[onclick*="\''+id+'\'"]');
    if(card){card.classList.toggle('obs',!!txt);let op=card.querySelector('.obs-prev');if(txt){if(!op){op=document.createElement('div');op.className='obs-prev';card.querySelector('.card-body').appendChild(op);}op.textContent='💬 '+txt;}else if(op)op.remove();}
    st.className='save-st ok';st.textContent='✓ Salvo';setTimeout(()=>{st.textContent='';st.className='save-st';},3000);
  }catch(err){st.className='save-st er';st.textContent='✗ '+err.message;}
  finally{btn.disabled=false;btn.textContent='💾 Salvar';}
}
function clrObs(id){document.getElementById('obsTA').value='';saveObs(id);}

document.addEventListener('keydown',ev=>{
  if(document.getElementById('ovl').classList.contains('open')){
    if(ev.key==='Escape')closeM();
    else if(ev.key==='ArrowLeft')navImg(-1);
    else if(ev.key==='ArrowRight')navImg(1);
  }
});

load();
</script>
</body>
</html>
