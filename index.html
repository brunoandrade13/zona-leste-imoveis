<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zona Leste Imóveis — Auditoria</title>
<style>
:root{--bg:#0f1117;--s:#181c27;--s2:#1f2438;--bd:#2a3050;--ac:#4f7dff;--ac2:#ff6b35;--w:#f5a623;--ok:#2ecc71;--t:#e8ecf4;--mt:#7a869e;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
header{background:linear-gradient(135deg,#0d1220,#1a2040);border-bottom:1px solid var(--bd);padding:16px 20px;position:sticky;top:0;z-index:100}
.hi{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-size:17px;font-weight:700;letter-spacing:-0.3px}.logo span{color:var(--ac)}
.hstats{display:flex;gap:20px;margin-left:auto}
.hn{font-size:20px;font-weight:700;color:var(--ac);line-height:1}
.hl{font-size:10px;color:var(--mt);text-transform:uppercase;letter-spacing:.5px}
.ctrl{max-width:1400px;margin:16px auto 0;padding:0 16px;display:flex;gap:8px;flex-wrap:wrap}
input,select{background:var(--s);border:1px solid var(--bd);border-radius:8px;color:var(--t);padding:8px 12px;font-size:13px;outline:none;transition:border-color .2s}
input{flex:1;min-width:200px}
input:focus,select:focus{border-color:var(--ac)}
.fbtn{background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--t);padding:8px 12px;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.fbtn:hover{border-color:var(--ac);color:var(--ac)}.fbtn.on{background:var(--ac);border-color:var(--ac);color:#fff}
.cbar{max-width:1400px;margin:8px auto 0;padding:0 16px;font-size:11px;color:var(--mt)}
.grid{max-width:1400px;margin:16px auto;padding:0 16px 40px;display:grid;gap:14px}
@media(min-width:580px){.grid{grid-template-columns:1fr 1fr}}
@media(min-width:860px){.grid{grid-template-columns:1fr 1fr 1fr}}
@media(min-width:1200px){.grid{grid-template-columns:repeat(4,1fr)}}
.card{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .2s,border-color .2s}
.card:hover{box-shadow:0 4px 20px rgba(79,125,255,.1);border-color:#3a4870}
.card.obs{border-color:var(--w)}
.card.obs:hover{box-shadow:0 4px 20px rgba(245,166,35,.15)}
.ci{width:100%;height:150px;object-fit:cover;display:block;cursor:pointer;background:var(--s2)}
.cp{width:100%;height:150px;background:var(--s2);display:flex;align-items:center;justify-content:center;color:var(--mt);font-size:28px;cursor:pointer}
.cb{padding:11px 13px;flex:1;display:flex;flex-direction:column;gap:5px}
.cn{font-size:12.5px;font-weight:600;line-height:1.3}
.cc,.cd{font-size:11px;color:var(--mt)}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.bn{background:rgba(79,125,255,.15);color:var(--ac)}
.bw{background:rgba(255,107,53,.15);color:var(--ac2)}
.bok{background:rgba(46,204,113,.12);color:var(--ok)}
.obs-box{margin-top:7px;background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:7px 10px;font-size:11.5px;color:var(--mt);min-height:48px;cursor:text;white-space:pre-wrap;word-break:break-word;line-height:1.5;transition:border-color .2s}
.obs-box:empty::before{content:attr(placeholder);color:#3a4a66;pointer-events:none}
.obs-box:focus{outline:none;border-color:var(--w);color:var(--t)}
.obs-box.ht{color:var(--w);border-color:rgba(245,166,35,.4)}
.oact{display:flex;gap:6px;margin-top:5px}
.bsave{background:var(--ac);color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;flex:1;transition:opacity .2s}
.bsave:disabled{opacity:.4;cursor:not-allowed}
.bclr{background:var(--s);color:var(--mt);border:1px solid var(--bd);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer}
.bclr:hover{border-color:#e74c3c;color:#e74c3c}
.ss{font-size:10px;color:var(--mt);margin-top:2px;min-height:12px}
.ss.ok{color:var(--ok)}.ss.er{color:#e74c3c}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--s);border:1px solid var(--bd);border-radius:14px;max-width:820px;width:95vw;max-height:90vh;overflow:auto;padding:18px}
.mtitle{font-size:15px;font-weight:700;margin-bottom:12px}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px}
.mimg{width:100%;height:95px;object-fit:cover;border-radius:6px;border:1px solid var(--bd)}
.mclose{float:right;background:var(--s2);border:none;color:var(--mt);border-radius:6px;padding:3px 10px;cursor:pointer;font-size:18px;line-height:1}
.loading{text-align:center;padding:60px 20px;color:var(--mt);font-size:13px;grid-column:1/-1}
</style>
</head>
<body>
<header>
  <div class="hi">
    <div class="logo">Zona Leste <span>Imóveis</span></div>
    <div style="font-size:11px;color:var(--mt)">Catálogo de auditoria de imagens</div>
    <div class="hstats">
      <div><div class="hn" id="sTotal">—</div><div class="hl">total</div></div>
      <div><div class="hn" id="sObs" style="color:var(--w)">—</div><div class="hl">com obs</div></div>
      <div><div class="hn" id="sShow">—</div><div class="hl">exibidos</div></div>
    </div>
  </div>
</header>

<div class="ctrl">
  <input type="text" id="qSearch" placeholder="🔍  Nome, construtora, bairro..." oninput="doFilter()">
  <select id="qObs" onchange="doFilter()">
    <option value="">Todas</option>
    <option value="com">Com observação</option>
    <option value="sem">Sem observação</option>
  </select>
  <button class="fbtn" id="bPouco" onclick="toggle('pouco')">📷 &lt;6 fotos</button>
  <button class="fbtn" id="bSF" onclick="toggle('sf')">🏢 Sem fachada</button>
</div>
<div class="cbar" id="cBar"></div>

<div class="grid" id="grid"><div class="loading">Carregando empreendimentos...</div></div>

<div class="overlay" id="ovl" onclick="if(event.target===this)closeM()">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="mtitle" id="mTitle"></div>
      <button class="mclose" onclick="closeM()">×</button>
    </div>
    <div class="mgrid" id="mGrid"></div>
  </div>
</div>

<script>
const SB = 'https://xmnggeptpwxsmcartyzt.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhtbmdnZXB0cHd4c21jYXJ0eXp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU3NjcxNTUsImV4cCI6MjA2MTM0MzE1NX0.aCbXhJJaKByxU0TS9PwP_pGJzY3MjJfPopOt-J-sH-w';
const H = {apikey:KEY,Authorization:'Bearer '+KEY};

let all=[], timers={}, af={pouco:false,sf:false};

async function load(){
  // Buscar metadados + observações do Supabase
  const [r1,r2] = await Promise.all([
    fetch(`${SB}/rest/v1/empreendimentos?ativo=eq.true&select=id,nome,construtora,bairro,observacao&order=nome`,{headers:H}),
    fetch(`${SB}/rest/v1/rpc/emp_stats`,{method:'POST',headers:{...H,'Content-Type':'application/json'},body:'{}'}),
  ]);
  const emps = await r1.json();
  
  // Buscar contagens de imagens via SQL agregado
  const r3 = await fetch(`${SB}/rest/v1/empreendimento_imagens?ativo=eq.true&select=empreendimento_id,tipo`,{headers:{...H,'Range':'0-9999'}});
  const imgs = await r3.json();
  
  // Agregar
  const stats = {};
  imgs.forEach(i=>{
    if(!stats[i.empreendimento_id]) stats[i.empreendimento_id]={total:0,fachada:0,capa:null};
    stats[i.empreendimento_id].total++;
    if(['fachada','perspectiva_3d'].includes(i.tipo)) stats[i.empreendimento_id].fachada++;
  });
  
  // Buscar capas (primeira imagem de fachada de cada emp)
  const r4 = await fetch(`${SB}/rest/v1/empreendimento_imagens?ativo=eq.true&tipo=in.(fachada,perspectiva_3d)&select=empreendimento_id,url&order=ordem`,{headers:{...H,'Range':'0-9999'}});
  const capas = await r4.json();
  const capaMap = {};
  capas.forEach(c=>{ if(!capaMap[c.empreendimento_id]) capaMap[c.empreendimento_id]=c.url; });
  
  all = emps.map(e=>({
    ...e,
    total: stats[e.id]?.total || 0,
    fachada: stats[e.id]?.fachada || 0,
    capa: capaMap[e.id] || null
  }));
  
  document.getElementById('sTotal').textContent = all.length;
  render();
}

function render(){
  const q=document.getElementById('qSearch').value.toLowerCase();
  const fo=document.getElementById('qObs').value;
  const shown=all.filter(e=>{
    if(q && !`${e.nome} ${e.construtora} ${e.bairro}`.toLowerCase().includes(q)) return false;
    if(fo==='com' && !(e.observacao&&e.observacao.trim())) return false;
    if(fo==='sem' && (e.observacao&&e.observacao.trim())) return false;
    if(af.pouco && e.total>=6) return false;
    if(af.sf && e.fachada>0) return false;
    return true;
  });
  
  const obsCount = all.filter(e=>e.observacao&&e.observacao.trim()).length;
  document.getElementById('sObs').textContent = obsCount;
  document.getElementById('sShow').textContent = shown.length;
  document.getElementById('cBar').textContent = `Mostrando ${shown.length} de ${all.length} empreendimentos`;
  
  const g=document.getElementById('grid');
  if(!shown.length){g.innerHTML='<div class="loading">Nenhum resultado</div>';return;}
  
  g.innerHTML=shown.map(e=>{
    const hasObs=e.observacao&&e.observacao.trim();
    const obs=hasObs?e.observacao.trim():'';
    const img=e.capa
      ?`<img class="ci" src="${e.capa}" loading="lazy" onclick="openG('${e.id}','${e.nome.replace(/'/g,"\\'")}')" onerror="this.outerHTML='<div class=cp onclick=openG(&quot;${e.id}&quot;,&quot;${e.nome.replace(/"/g,'&quot;')}&quot;)>🏗</div>'">`
      :`<div class="cp" onclick="openG('${e.id}','${e.nome.replace(/'/g,"\\'")}')">🏗</div>`;
    const bn=e.total<6?`<span class="badge bw">⚠ ${e.total} fotos</span>`:`<span class="badge bn">${e.total} fotos</span>`;
    const bf=e.fachada===0?`<span class="badge bw">Sem fachada</span>`:`<span class="badge bok">🏢 ${e.fachada}</span>`;
    return `<div class="card${hasObs?' obs':''}" data-id="${e.id}">
      ${img}
      <div class="cb">
        <div class="cn">${e.nome}</div>
        <div class="cc">${e.construtora}</div>
        <div class="cd">📍 ${e.bairro||'—'}</div>
        <div class="badges">${bn}${bf}</div>
        <div class="obs-box${obs?' ht':''}" contenteditable="true" placeholder="✏ Clique para observação..." data-id="${e.id}" oninput="sched('${e.id}',this)">${obs}</div>
        <div class="oact">
          <button class="bsave" id="btn${e.id}" onclick="save('${e.id}')">Salvar</button>
          <button class="bclr" onclick="clr('${e.id}')">Limpar</button>
        </div>
        <div class="ss" id="ss${e.id}"></div>
      </div>
    </div>`;
  }).join('');
}

function doFilter(){render();}
function toggle(k){
  af[k]=!af[k];
  document.getElementById(k==='pouco'?'bPouco':'bSF').classList.toggle('on',af[k]);
  render();
}

function sched(id,el){
  clearTimeout(timers[id]);
  timers[id]=setTimeout(()=>save(id),2000);
}

async function save(id){
  const el=document.querySelector(`.obs-box[data-id="${id}"]`);
  const txt=el?el.innerText.trim():'';
  const btn=document.getElementById('btn'+id);
  const ss=document.getElementById('ss'+id);
  if(btn){btn.disabled=true;btn.textContent='...';}
  try{
    const r=await fetch(`${SB}/rest/v1/empreendimentos?id=eq.${id}`,{
      method:'PATCH',
      headers:{...H,'Content-Type':'application/json',Prefer:'return=minimal'},
      body:JSON.stringify({observacao:txt||null})
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const emp=all.find(e=>e.id===id);
    if(emp) emp.observacao=txt;
    if(el) el.classList.toggle('ht',!!txt);
    const card=el?.closest('.card');
    if(card) card.classList.toggle('obs',!!txt);
    document.getElementById('sObs').textContent=all.filter(e=>e.observacao&&e.observacao.trim()).length;
    if(ss){ss.className='ss ok';ss.textContent='✓ Salvo';setTimeout(()=>{ss.textContent='';ss.className='ss';},3000);}
  }catch(e){
    if(ss){ss.className='ss er';ss.textContent='✗ Erro: '+e.message;}
  }finally{
    if(btn){btn.disabled=false;btn.textContent='Salvar';}
  }
}

async function clr(id){
  const el=document.querySelector(`.obs-box[data-id="${id}"]`);
  if(el) el.innerText='';
  await save(id);
}

async function openG(id,nome){
  document.getElementById('mTitle').textContent=nome;
  document.getElementById('mGrid').innerHTML='<div style="color:var(--mt);font-size:12px">Carregando...</div>';
  document.getElementById('ovl').classList.add('open');
  try{
    const r=await fetch(`${SB}/rest/v1/empreendimento_imagens?empreendimento_id=eq.${id}&ativo=eq.true&select=url,tipo,ordem&order=ordem`,{headers:H});
    const imgs=await r.json();
    document.getElementById('mGrid').innerHTML=imgs.length
      ?imgs.map(i=>`<div><img class="mimg" src="${i.url}" loading="lazy" title="${i.tipo} #${i.ordem}"><div style="font-size:9px;color:var(--mt);padding:2px 4px">${i.tipo} #${i.ordem}</div></div>`).join('')
      :'<div style="color:var(--mt);font-size:12px">Sem imagens</div>';
  }catch(e){document.getElementById('mGrid').innerHTML='<div style="color:#e74c3c;font-size:12px">Erro: '+e.message+'</div>';}
}
function closeM(){document.getElementById('ovl').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});

load();
</script>
</body>
</html>
