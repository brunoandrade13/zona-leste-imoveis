<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zona Leste Imóveis — Auditoria</title>
<style>
:root{--bg:#0f1117;--s:#181c27;--s2:#1f2438;--bd:#2a3050;--ac:#4f7dff;--ac2:#ff6b35;--w:#f5a623;--ok:#2ecc71;--t:#e8ecf4;--mt:#7a869e;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}

/* HEADER */
header{background:linear-gradient(135deg,#0d1220,#1a2040);border-bottom:1px solid var(--bd);padding:16px 20px;position:sticky;top:0;z-index:100}
.hi{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-size:17px;font-weight:700;letter-spacing:-.3px;cursor:pointer}.logo span{color:var(--ac)}
.hstats{display:flex;gap:20px;margin-left:auto}
.hn{font-size:20px;font-weight:700;color:var(--ac);line-height:1}
.hl{font-size:10px;color:var(--mt);text-transform:uppercase;letter-spacing:.5px}

/* CONTROLES */
.ctrl{max-width:1400px;margin:16px auto 0;padding:0 16px;display:flex;gap:8px;flex-wrap:wrap}
input,select{background:var(--s);border:1px solid var(--bd);border-radius:8px;color:var(--t);padding:8px 12px;font-size:13px;outline:none;transition:border-color .2s}
input{flex:1;min-width:200px}
input:focus,select:focus{border-color:var(--ac)}
.fbtn{background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--t);padding:8px 12px;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.fbtn:hover{border-color:var(--ac);color:var(--ac)}.fbtn.on{background:var(--ac);border-color:var(--ac);color:#fff}
.cbar{max-width:1400px;margin:8px auto 0;padding:0 16px;font-size:11px;color:var(--mt)}

/* GRID DE CARDS */
.grid{max-width:1400px;margin:16px auto;padding:0 16px 40px;display:grid;gap:14px}
@media(min-width:580px){.grid{grid-template-columns:1fr 1fr}}
@media(min-width:860px){.grid{grid-template-columns:1fr 1fr 1fr}}
@media(min-width:1200px){.grid{grid-template-columns:repeat(4,1fr)}}

/* CARD */
.card{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .2s,border-color .2s;cursor:pointer}
.card:hover{box-shadow:0 4px 20px rgba(79,125,255,.15);border-color:#3a4870;transform:translateY(-1px)}
.card.obs{border-color:var(--w)}
.card.obs:hover{box-shadow:0 4px 20px rgba(245,166,35,.15)}
.ci{width:100%;height:150px;object-fit:cover;display:block;background:var(--s2)}
.cp{width:100%;height:150px;background:var(--s2);display:flex;align-items:center;justify-content:center;color:var(--mt);font-size:32px}
.cb{padding:11px 13px;flex:1;display:flex;flex-direction:column;gap:5px}
.cn{font-size:12.5px;font-weight:600;line-height:1.3;color:var(--t)}
.cc,.cd{font-size:11px;color:var(--mt)}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.bn{background:rgba(79,125,255,.15);color:var(--ac)}
.bw{background:rgba(255,107,53,.15);color:var(--ac2)}
.bok{background:rgba(46,204,113,.12);color:var(--ok)}
.obs-preview{margin-top:6px;font-size:11px;color:var(--w);font-style:italic;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.loading{text-align:center;padding:60px;color:var(--mt);font-size:14px;grid-column:1/-1}

/* MODAL DETALHE */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;overflow-y:auto;padding:20px}
.overlay.open{display:block}
.detail{background:var(--s);border:1px solid var(--bd);border-radius:14px;max-width:900px;margin:0 auto;overflow:hidden}
.detail-header{background:linear-gradient(135deg,#0d1220,#1a2040);padding:20px 24px;display:flex;align-items:flex-start;gap:16px}
.detail-back{background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--mt);padding:6px 12px;cursor:pointer;font-size:13px;white-space:nowrap;flex-shrink:0}
.detail-back:hover{color:var(--t);border-color:var(--ac)}
.detail-title{font-size:18px;font-weight:700;line-height:1.3}
.detail-sub{font-size:13px;color:var(--mt);margin-top:4px}
.detail-body{padding:20px 24px;display:flex;flex-direction:column;gap:20px}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.info-box{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px}
.info-label{font-size:10px;color:var(--mt);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.info-value{font-size:13px;font-weight:600;color:var(--t)}
.info-value.ok{color:var(--ok)}.info-value.warn{color:var(--ac2)}.info-value.accent{color:var(--ac)}

/* GALERIA POR TIPO */
.section-title{font-size:13px;font-weight:600;color:var(--mt);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.img-item{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--bd);background:var(--s2)}
.img-item img{width:100%;height:100px;object-fit:cover;display:block;cursor:zoom-in}
.img-item img:hover{opacity:.85}
.img-tipo{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);font-size:9px;color:#aaa;padding:3px 6px}

/* OBSERVAÇÃO */
.obs-section{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:14px}
.obs-section .section-title{margin-bottom:8px}
.obs-input{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:7px;color:var(--t);padding:10px 12px;font-size:13px;line-height:1.5;min-height:80px;resize:vertical;outline:none;transition:border-color .2s;font-family:inherit}
.obs-input:focus{border-color:var(--w)}
.obs-input::placeholder{color:#3a4a66}
.obs-actions{display:flex;gap:8px;margin-top:8px;align-items:center}
.btn-save-obs{background:var(--ac);color:#fff;border:none;border-radius:7px;padding:7px 18px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-save-obs:disabled{opacity:.4;cursor:not-allowed}
.btn-clr-obs{background:var(--s);color:var(--mt);border:1px solid var(--bd);border-radius:7px;padding:7px 12px;font-size:12px;cursor:pointer}
.btn-clr-obs:hover{border-color:#e74c3c;color:#e74c3c}
.obs-status{font-size:11px;color:var(--mt)}
.obs-status.ok{color:var(--ok)}.obs-status.er{color:#e74c3c}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:300;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:6px}
.lb-close{position:fixed;top:16px;right:20px;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:24px;cursor:pointer;border-radius:8px;padding:4px 12px;z-index:301}
.lb-info{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#aaa;font-size:12px;padding:6px 14px;border-radius:20px}
</style>
</head>
<body>

<header>
  <div class="hi">
    <div class="logo" onclick="showList()">Zona Leste <span>Imóveis</span></div>
    <div style="font-size:11px;color:var(--mt)" id="hSub">Auditoria de imagens · clique no card para ver detalhes</div>
    <div class="hstats">
      <div><div class="hn" id="sT">—</div><div class="hl">total</div></div>
      <div><div class="hn" id="sO" style="color:var(--w)">—</div><div class="hl">com obs</div></div>
      <div><div class="hn" id="sS">—</div><div class="hl">exibidos</div></div>
    </div>
  </div>
</header>

<!-- LISTA -->
<div id="listView">
  <div class="ctrl">
    <input type="text" id="qS" placeholder="🔍  Nome, construtora, bairro..." oninput="flt()">
    <select id="qO" onchange="flt()">
      <option value="">Todos</option>
      <option value="com">Com observação</option>
      <option value="sem">Sem observação</option>
    </select>
    <button class="fbtn" id="bP" onclick="tgl('p')">📷 &lt;6 fotos</button>
    <button class="fbtn" id="bF" onclick="tgl('f')">🏢 Sem fachada</button>
  </div>
  <div class="cbar" id="cB"></div>
  <div class="grid" id="grid"><div class="loading">Carregando empreendimentos…</div></div>
</div>

<!-- DETALHE (overlay) -->
<div class="overlay" id="detailView">
  <div class="detail" id="detailBox"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lb" onclick="closeLB()">
  <button class="lb-close" onclick="closeLB()">×</button>
  <img id="lbImg" src="" alt="">
  <div class="lb-info" id="lbInfo"></div>
</div>

<script>
const SB='https://xmnggeptpwxsmcartyzt.supabase.co';
const K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhtbmdnZXB0cHd4c21jYXJ0eXp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NjkzMzIsImV4cCI6MjA5NzE0NTMzMn0.2HWGvTAuEuzEHXcEbOr9t0gC1yc765lxQxk080EDmfg';
const H={apikey:K,Authorization:'Bearer '+K};
let all=[],tm={},af={p:false,f:false};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function load(){
  const [re,ri,rc]=await Promise.all([
    fetch(SB+'/rest/v1/empreendimentos?ativo=eq.true&select=id,nome,construtora,bairro,observacao,status,valor_min,valor_max,area_min,area_max,dormitorios&order=nome',{headers:H}),
    fetch(SB+'/rest/v1/empreendimento_imagens?ativo=eq.true&select=empreendimento_id,tipo',{headers:{...H,'Range':'0-9999'}}),
    fetch(SB+'/rest/v1/empreendimento_imagens?ativo=eq.true&tipo=in.(fachada,perspectiva_3d)&select=empreendimento_id,url&order=ordem',{headers:{...H,'Range':'0-9999'}})
  ]);
  const emps=await re.json(),imgs=await ri.json(),caps=await rc.json();
  const st={},cm={};
  imgs.forEach(i=>{
    if(!st[i.empreendimento_id])st[i.empreendimento_id]={t:0,f:0};
    st[i.empreendimento_id].t++;
    if(['fachada','perspectiva_3d'].includes(i.tipo))st[i.empreendimento_id].f++;
  });
  caps.forEach(c=>{if(!cm[c.empreendimento_id])cm[c.empreendimento_id]=c.url;});
  all=emps.map(e=>({...e,total:st[e.id]?.t||0,fach:st[e.id]?.f||0,capa:cm[e.id]||null}));
  document.getElementById('sT').textContent=all.length;
  render();
}

function render(){
  const q=document.getElementById('qS').value.toLowerCase();
  const fo=document.getElementById('qO').value;
  const sh=all.filter(e=>{
    if(q&&!(e.nome+' '+e.construtora+' '+e.bairro).toLowerCase().includes(q))return false;
    if(fo==='com'&&!(e.observacao&&e.observacao.trim()))return false;
    if(fo==='sem'&&(e.observacao&&e.observacao.trim()))return false;
    if(af.p&&e.total>=6)return false;
    if(af.f&&e.fach>0)return false;
    return true;
  });
  document.getElementById('sO').textContent=all.filter(e=>e.observacao&&e.observacao.trim()).length;
  document.getElementById('sS').textContent=sh.length;
  document.getElementById('cB').textContent='Mostrando '+sh.length+' de '+all.length+' empreendimentos';
  const g=document.getElementById('grid');
  if(!sh.length){g.innerHTML='<div class="loading">Nenhum resultado</div>';return;}
  g.innerHTML=sh.map(e=>{
    const ho=e.observacao&&e.observacao.trim();
    const ei=e.capa
      ?'<img class="ci" src="'+esc(e.capa)+'" loading="lazy" alt="">'
      :'<div class="cp">🏗</div>';
    const bn=e.total<6?'<span class="badge bw">⚠ '+e.total+' fotos</span>':'<span class="badge bn">'+e.total+' fotos</span>';
    const bf=e.fach===0?'<span class="badge bw">Sem fachada</span>':'<span class="badge bok">🏢 '+e.fach+'</span>';
    const op=ho?'<div class="obs-preview">💬 '+esc(e.observacao.trim())+'</div>':'';
    return '<div class="card'+(ho?' obs':'')+'" onclick="openDetail(\''+e.id+'\')">'+ei
      +'<div class="cb"><div class="cn">'+esc(e.nome)+'</div>'
      +'<div class="cc">'+esc(e.construtora)+'</div>'
      +'<div class="cd">📍 '+esc(e.bairro||'—')+'</div>'
      +'<div class="badges">'+bn+bf+'</div>'+op+'</div></div>';
  }).join('');
}

function flt(){render();}
function tgl(k){af[k]=!af[k];document.getElementById(k==='p'?'bP':'bF').classList.toggle('on',af[k]);render();}

// ── DETALHE ──
async function openDetail(id){
  const emp=all.find(e=>e.id===id);
  if(!emp)return;
  document.getElementById('hSub').textContent='← clique no logo para voltar à lista';
  document.getElementById('listView').style.display='none';
  const dv=document.getElementById('detailView');
  dv.classList.add('open');
  dv.scrollTop=0;
  document.getElementById('detailBox').innerHTML='<div style="padding:40px;text-align:center;color:var(--mt)">Carregando…</div>';

  // Buscar imagens do empreendimento
  const r=await fetch(SB+'/rest/v1/empreendimento_imagens?empreendimento_id=eq.'+id+'&ativo=eq.true&select=url,tipo,ordem&order=ordem',{headers:H});
  const imgs=await r.json();

  // Buscar tipologias se existirem
  let tiposHTML='';
  try{
    const rt=await fetch(SB+'/rest/v1/tipologias?empreendimento_id=eq.'+id+'&select=dormitorios,area_m2,descricao&order=dormitorios',{headers:H});
    const tipos=await rt.json();
    if(tipos.length){
      tiposHTML='<div><div class="section-title">Tipologias</div><div style="display:flex;gap:8px;flex-wrap:wrap">'
        +tipos.map(t=>'<div style="background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;font-size:12px"><strong>'+esc(t.dormitorios||'—')+'</strong>'+(t.area_m2?' · '+t.area_m2+'m²':'')+(t.descricao?'<br><span style="color:var(--mt);font-size:11px">'+esc(t.descricao)+'</span>':'')+'</div>').join('')
        +'</div></div>';
    }
  }catch(e){}

  // Agrupar imagens por tipo
  const grupos={fachada:[],perspectiva_3d:[],lazer:[],interiores:[],planta:[],outros:[]};
  imgs.forEach(i=>{
    const k=grupos[i.tipo]?i.tipo:'outros';
    grupos[k].push(i);
  });
  const nomeTipo={fachada:'Fachada / Exterior',perspectiva_3d:'Perspectiva 3D',lazer:'Áreas de Lazer',interiores:'Interiores',planta:'Plantas',outros:'Outras'};

  let galeriaHTML='';
  for(const [tipo,list] of Object.entries(grupos)){
    if(!list.length)continue;
    galeriaHTML+='<div><div class="section-title">'+nomeTipo[tipo]+' ('+list.length+')</div>'
      +'<div class="img-grid">'
      +list.map(i=>'<div class="img-item"><img src="'+esc(i.url)+'" loading="lazy" onclick="openLB(\''+esc(i.url)+'\',\''+nomeTipo[tipo]+' #'+i.ordem+'\')" alt=""><div class="img-tipo">'+nomeTipo[tipo]+' · ord='+i.ordem+'</div></div>').join('')
      +'</div></div>';
  }

  // Stats
  const nFach=imgs.filter(i=>['fachada','perspectiva_3d'].includes(i.tipo)).length;
  const nLaz=imgs.filter(i=>i.tipo==='lazer').length;
  const nInt=imgs.filter(i=>i.tipo==='interiores').length;
  const nPla=imgs.filter(i=>i.tipo==='planta').length;

  document.getElementById('detailBox').innerHTML=`
    <div class="detail-header">
      <button class="detail-back" onclick="showList()">← Voltar</button>
      <div>
        <div class="detail-title">${esc(emp.nome)}</div>
        <div class="detail-sub">${esc(emp.construtora)} · 📍 ${esc(emp.bairro||'—')}</div>
      </div>
    </div>
    <div class="detail-body">

      <div class="info-grid">
        <div class="info-box"><div class="info-label">Total de fotos</div><div class="info-value ${emp.total<6?'warn':'ok'}">${emp.total} ${emp.total<6?'⚠':'✓'}</div></div>
        <div class="info-box"><div class="info-label">Fachada/3D</div><div class="info-value ${nFach===0?'warn':'accent'}">${nFach}</div></div>
        <div class="info-box"><div class="info-label">Lazer</div><div class="info-value accent">${nLaz}</div></div>
        <div class="info-box"><div class="info-label">Interiores</div><div class="info-value accent">${nInt}</div></div>
        <div class="info-box"><div class="info-label">Plantas</div><div class="info-value accent">${nPla}</div></div>
        <div class="info-box"><div class="info-label">Status</div><div class="info-value">${esc(emp.status||'—')}</div></div>
        ${emp.area_min?'<div class="info-box"><div class="info-label">Área</div><div class="info-value">'+esc(emp.area_min)+(emp.area_max&&emp.area_max!==emp.area_min?' – '+esc(emp.area_max):'')+'m²</div></div>':''}
        ${emp.dormitorios?'<div class="info-box"><div class="info-label">Dormitórios</div><div class="info-value">'+esc(emp.dormitorios)+'</div></div>':''}
        ${emp.valor_min?'<div class="info-box"><div class="info-label">Valor</div><div class="info-value">R$ '+esc(emp.valor_min)+(emp.valor_max&&emp.valor_max!==emp.valor_min?' – R$ '+esc(emp.valor_max):'')+'</div></div>':''}
      </div>

      ${tiposHTML}

      <div class="obs-section">
        <div class="section-title">Observação / Problema a corrigir</div>
        <textarea class="obs-input" id="obsInput" placeholder="Descreva o que está errado ou precisa ser corrigido neste empreendimento…">${esc(emp.observacao||'')}</textarea>
        <div class="obs-actions">
          <button class="btn-save-obs" id="btnSaveObs" onclick="saveObs('${id}')">💾 Salvar observação</button>
          <button class="btn-clr-obs" onclick="clearObs('${id}')">Limpar</button>
          <span class="obs-status" id="obsStatus"></span>
        </div>
      </div>

      ${galeriaHTML||'<div style="color:var(--mt);font-size:13px">Nenhuma imagem ativa neste empreendimento.</div>'}
    </div>`;
}

function showList(){
  document.getElementById('hSub').textContent='Auditoria de imagens · clique no card para ver detalhes';
  document.getElementById('listView').style.display='';
  document.getElementById('detailView').classList.remove('open');
}

async function saveObs(id){
  const txt=document.getElementById('obsInput').value.trim();
  const btn=document.getElementById('btnSaveObs');
  const ss=document.getElementById('obsStatus');
  btn.disabled=true;btn.textContent='Salvando…';
  try{
    const r=await fetch(SB+'/rest/v1/empreendimentos?id=eq.'+id,{
      method:'PATCH',
      headers:{...H,'Content-Type':'application/json',Prefer:'return=minimal'},
      body:JSON.stringify({observacao:txt||null})
    });
    if(!r.ok)throw new Error('HTTP '+r.status);
    const emp=all.find(e=>e.id===id);
    if(emp){emp.observacao=txt;const card=document.querySelector('.card[onclick*="\''+id+'\'"]');if(card){card.classList.toggle('obs',!!txt);const op=card.querySelector('.obs-preview');if(txt){if(!op){const d=document.createElement('div');d.className='obs-preview';d.textContent='💬 '+txt;card.querySelector('.cb').appendChild(d);}else op.textContent='💬 '+txt;}else if(op)op.remove();}}
    document.getElementById('sO').textContent=all.filter(e=>e.observacao&&e.observacao.trim()).length;
    ss.className='obs-status ok';ss.textContent='✓ Salvo com sucesso';
    setTimeout(()=>{ss.textContent='';ss.className='obs-status';},3000);
  }catch(e){ss.className='obs-status er';ss.textContent='✗ Erro: '+e.message;}
  finally{btn.disabled=false;btn.textContent='💾 Salvar observação';}
}

function clearObs(id){
  document.getElementById('obsInput').value='';
  saveObs(id);
}

// ── LIGHTBOX ──
function openLB(url,info){
  document.getElementById('lbImg').src=url;
  document.getElementById('lbInfo').textContent=info;
  document.getElementById('lb').classList.add('open');
}
function closeLB(){document.getElementById('lb').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLB();showList();}});

load();
</script>
</body>
</html>
