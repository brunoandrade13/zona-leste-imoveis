<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZonaLeste.SP</title>
<style>
:root{--bg:#0f1117;--s:#181c27;--s2:#1f2438;--bd:#252d45;--ac:#4f7dff;--w:#f5a623;--ok:#2ecc71;--t:#e8ecf4;--mt:#5a6480;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}

/* TOP BAR */
.topbar{background:#0b0f1a;border-bottom:1px solid var(--bd);padding:0 20px;display:flex;align-items:center;gap:0;height:48px;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:800;letter-spacing:-.5px;white-space:nowrap;margin-right:16px}
.logo-zona{color:var(--t)}.logo-leste{color:var(--ac)}.logo-sp{color:var(--mt);font-size:14px;margin-left:1px}
.topbar-stats{display:flex;gap:0;border-left:1px solid var(--bd);margin-right:8px}
.tstat{padding:0 14px;font-size:12px;color:var(--mt);border-right:1px solid var(--bd);display:flex;align-items:center;gap:5px;height:48px;white-space:nowrap}
.tstat strong{color:var(--t);font-weight:600}
.tsearch{flex:1;max-width:340px;margin:0 8px;position:relative}
.tsearch input{width:100%;background:var(--s);border:1px solid var(--bd);border-radius:7px;color:var(--t);padding:7px 12px 7px 32px;font-size:13px;outline:none}
.tsearch input:focus{border-color:var(--ac)}
.tsearch::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px}
.topbar-right{margin-left:auto;display:flex;gap:6px}
.tbtn{background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--mt);padding:5px 12px;font-size:12px;cursor:pointer;white-space:nowrap}
.tbtn:hover{color:var(--t);border-color:var(--ac)}
.tbtn.on{background:var(--ac);border-color:var(--ac);color:#fff}

/* FILTROS */
.filters{background:#0d1120;border-bottom:1px solid var(--bd);padding:0 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:44px}
.fl{display:flex;align-items:center;gap:6px}
.fl-label{font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.fl select{background:var(--s);border:1px solid var(--bd);border-radius:6px;color:var(--t);padding:5px 8px;font-size:12px;cursor:pointer;outline:none;max-width:150px}
.fl select:focus{border-color:var(--ac)}
.fbtn{background:var(--s);border:1px solid var(--bd);border-radius:6px;color:var(--mt);padding:5px 10px;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.fbtn:hover{color:var(--t);border-color:var(--ac)}.fbtn.on{background:rgba(79,125,255,.15);border-color:var(--ac);color:var(--ac)}
.fcount{margin-left:auto;font-size:12px;color:var(--mt);white-space:nowrap}
.fcount strong{background:var(--ac);color:#fff;border-radius:20px;padding:1px 8px;font-size:11px;margin-left:4px}

/* GRID */
.grid-wrap{max-width:1400px;margin:20px auto;padding:0 20px 60px}
.grid{display:grid;gap:18px}
.grid.g3{grid-template-columns:repeat(3,1fr)}
.grid.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1100px){.grid.g3,.grid.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.grid.g3,.grid.g4{grid-template-columns:1fr}}

/* LISTA MODE */
.grid.list{grid-template-columns:1fr}
.grid.list .card{flex-direction:row;height:100px}
.grid.list .card-img-wrap{width:160px;flex-shrink:0;height:100%}
.grid.list .card-img,.grid.list .card-no-img{height:100%!important}
.grid.list .card-body{padding:10px 14px}
.grid.list .card-tipologias,.grid.list .card-inforow,.grid.list .card-price{display:none}
.grid.list .card-name{font-size:13px}

/* CARD */
.card{background:var(--s);border:1px solid var(--bd);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:box-shadow .2s,border-color .2s,transform .15s}
.card:hover{box-shadow:0 8px 32px rgba(0,0,0,.5);border-color:#3a4870;transform:translateY(-2px)}
.card.obs{border-color:var(--w)}.card.obs:hover{box-shadow:0 8px 32px rgba(245,166,35,.15)}

/* IMAGEM DO CARD */
.card-img-wrap{position:relative}
.card-img{width:100%;height:200px;object-fit:cover;display:block;background:var(--s2)}
.card-no-img{width:100%;height:200px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--mt)}
.card-count{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.65);color:#fff;font-size:11px;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:4px}

/* CARD BODY */
.card-body{padding:13px 15px;display:flex;flex-direction:column;gap:8px;flex:1}
.card-tags{display:flex;gap:5px;flex-wrap:wrap}
.ctag{font-size:9px;font-weight:800;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.4px}
.ctag-status{background:rgba(79,125,255,.18);color:var(--ac)}
.ctag-padrao{background:rgba(255,255,255,.08);color:#8899bb}
.card-name{font-size:15px;font-weight:700;line-height:1.25;color:var(--t)}
.card-corp{font-size:12px;color:var(--mt);margin-top:-4px}

/* TIPOLOGIAS */
.card-tipologias{display:flex;gap:5px;flex-wrap:wrap}
.tipo-tag{background:var(--s2);border:1px solid var(--bd);border-radius:5px;font-size:11px;padding:3px 8px;color:#9aaacf;white-space:nowrap}
.tipo-tag.more{color:var(--ac);border-color:rgba(79,125,255,.3)}

/* INFO GRID */
.card-inforow{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px}
.ci-item{}
.ci-label{font-size:10px;color:var(--mt);margin-bottom:1px}
.ci-value{font-size:13px;font-weight:700;color:var(--t)}

/* PREÇO */
.card-price-row{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:6px;border-top:1px solid var(--bd)}
.card-price{font-size:16px;font-weight:800;color:var(--w)}
.card-bairro{font-size:11px;color:var(--mt)}

/* ─── MODAL ─── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;overflow-y:auto;padding:24px 16px 50px}
.overlay.open{display:block}
.modal{background:var(--s);border:1px solid var(--bd);border-radius:14px;max-width:880px;margin:0 auto;overflow:hidden}
.gallery{position:relative;background:#000;aspect-ratio:16/9;max-height:460px;overflow:hidden}
.gal-main{width:100%;height:100%;object-fit:contain;display:block}
.gal-no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--mt)}
.gnav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.55);border:none;color:#fff;font-size:24px;cursor:pointer;padding:10px 15px;border-radius:8px;z-index:5}
.gnav:hover{background:rgba(79,125,255,.75)}
.gprev{left:10px}.gnext{right:10px}
.gcnt{position:absolute;bottom:10px;right:12px;background:rgba(0,0,0,.65);color:#fff;font-size:11px;padding:3px 10px;border-radius:20px}
.thumbs{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;background:#0a0d16;border-bottom:1px solid var(--bd)}
.thumbs::-webkit-scrollbar{height:4px}.thumbs::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.thumb{width:70px;height:48px;object-fit:cover;border-radius:5px;cursor:pointer;border:2px solid transparent;flex-shrink:0;opacity:.55;transition:all .15s}
.thumb.on{border-color:var(--w);opacity:1}.thumb:hover{opacity:.9}
.modal-body{padding:20px 22px;display:flex;flex-direction:column;gap:16px}
.modal-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.modal-title{font-size:19px;font-weight:700;line-height:1.25}
.modal-meta{font-size:12px;color:var(--mt);margin-top:3px}
.mclose{background:var(--s2);border:1px solid var(--bd);color:var(--mt);border-radius:8px;padding:4px 13px;font-size:20px;cursor:pointer;line-height:1.2;flex-shrink:0}
.mclose:hover{color:var(--t);border-color:var(--ac)}
.msec{border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.msec-title{background:var(--s2);padding:8px 14px;font-size:10px;font-weight:700;color:var(--ac);text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--bd)}
.msec-title.yw{color:var(--w)}
.mig{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}
.mib{padding:9px 14px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd)}
.mil{font-size:10px;color:var(--mt);margin-bottom:2px}
.miv{font-size:12.5px;font-weight:600;color:var(--t);word-break:break-word}
.miv.ok{color:var(--ok)}.miv.warn{color:#ff6b35}.miv.ac{color:var(--ac)}.miv.sm{font-size:11.5px;font-weight:400}
.mifw{grid-column:1/-1;padding:9px 14px;border-bottom:1px solid var(--bd)}
.obs-ta{width:100%;background:var(--bg);border:none;border-bottom:1px solid var(--bd);color:var(--t);padding:10px 14px;font-size:13px;min-height:72px;resize:vertical;outline:none;font-family:inherit;line-height:1.6}
.obs-ta::placeholder{color:#3a4a66}.obs-ta:focus{border-bottom-color:var(--w)}
.obs-foot{display:flex;gap:8px;padding:8px 14px;align-items:center}
.bsv{background:var(--ac);color:#fff;border:none;border-radius:7px;padding:6px 18px;font-size:12px;font-weight:600;cursor:pointer}
.bsv:disabled{opacity:.4}
.bclr{background:var(--s2);color:var(--mt);border:1px solid var(--bd);border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer}
.bclr:hover{border-color:#e74c3c;color:#e74c3c}
.ost{font-size:11px;color:var(--mt)}.ost.ok{color:var(--ok)}.ost.er{color:#e74c3c}
.lnks{display:flex;gap:7px;flex-wrap:wrap;padding:10px 14px}
.lnk{display:inline-flex;align-items:center;gap:4px;background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:5px 11px;font-size:12px;color:var(--ac);text-decoration:none}
.lnk:hover{border-color:var(--ac)}
.loading{text-align:center;padding:60px;color:var(--mt);font-size:14px;grid-column:1/-1}
.obs-card-preview{margin-top:4px;font-size:11px;color:var(--w);font-style:italic;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo"><span class="logo-zona">Zona</span><span class="logo-leste">Leste</span><span class="logo-sp">.SP</span></div>
  <div class="topbar-stats">
    <div class="tstat"><strong id="sTot">—</strong> emp.</div>
    <div class="tstat"><strong id="sFotos">—</strong> fotos</div>
    <div class="tstat" id="sWith">—</div>
  </div>
  <div class="tsearch"><input type="text" id="qBusca" placeholder="Nome, incorporadora, bairro..." oninput="flt()"></div>
  <div class="topbar-right">
    <button class="tbtn" id="btnLista" onclick="toggleLista()">☰ Lista</button>
    <button class="tbtn" onclick="exportCSV()">↓ CSV</button>
  </div>
</div>

<!-- FILTROS -->
<div class="filters">
  <div class="fl"><span class="fl-label">Status</span>
    <select id="fStatus" onchange="flt()"><option value="">Todos</option></select></div>
  <div class="fl"><span class="fl-label">Bairro</span>
    <select id="fBairro" onchange="flt()"><option value="">Todos</option></select></div>
  <div class="fl"><span class="fl-label">Incorporadora</span>
    <select id="fInc" onchange="flt()"><option value="">Todas</option></select></div>
  <div class="fl"><span class="fl-label">Programa</span>
    <select id="fProg" onchange="flt()"><option value="">Todos</option></select></div>
  <div class="fl"><span class="fl-label">Quartos</span>
    <select id="fQ" onchange="flt()">
      <option value="">Todos</option>
      <option value="studio">Studio</option>
      <option value="1">1 dorm.</option>
      <option value="2">2 dorm.</option>
      <option value="3">3 dorm.</option>
      <option value="4">4+ dorm.</option>
    </select></div>
  <div class="fl"><span class="fl-label">Preço</span>
    <select id="fPreco" onchange="flt()">
      <option value="">Qualquer</option>
      <option value="0-300">Até R$300k</option>
      <option value="300-500">R$300–500k</option>
      <option value="500-800">R$500–800k</option>
      <option value="800-1500">R$800k–1,5M</option>
      <option value="1500-">Acima R$1,5M</option>
    </select></div>
  <button class="fbtn" id="bMCMV" onclick="tgl('mcmv')">MCMV</button>
  <button class="fbtn" id="bDest" onclick="tgl('dest')">⭐ Destaque</button>
  <div class="fl"><span class="fl-label">Ordenar</span>
    <select id="fSort" onchange="flt()">
      <option value="nome">Nome A–Z</option>
      <option value="preco_asc">Menor preço</option>
      <option value="preco_desc">Maior preço</option>
      <option value="fotos_desc">Mais fotos</option>
      <option value="entrega">Entrega</option>
    </select></div>
  <div class="fcount">Resultados <strong id="fCnt">—</strong></div>
</div>

<div class="grid-wrap">
  <div class="grid g3" id="grid"><div class="loading">Carregando empreendimentos…</div></div>
</div>

<!-- MODAL -->
<div class="overlay" id="ovl" onclick="if(event.target===this)closeM()">
  <div class="modal" id="mBox"></div>
</div>

<script>
const SB='https://xmnggeptpwxsmcartyzt.supabase.co';
const K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhtbmdnZXB0cHd4c21jYXJ0eXp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NjkzMzIsImV4cCI6MjA5NzE0NTMzMn0.2HWGvTAuEuzEHXcEbOr9t0gC1yc765lxQxk080EDmfg';
const H={apikey:K,Authorization:'Bearer '+K};
let all=[],filt=[],curImgs=[],curIdx=0,isLista=false;
let af={mcmv:false,dest:false};

function e(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function v(x){return (x===null||x===undefined||x==='')?'—':x;}
function brl(n){if(!n)return '—';const m=Number(n);return m>=1000000?'R$ '+(m/1000000).toFixed(m%1000000===0?0:1)+'M':'R$ '+(m/1000).toFixed(0)+'k';}
function bool(b){return b===true?'<span style="color:var(--ok)">✓ Sim</span>':b===false?'<span style="color:var(--mt)">Não</span>':'—';}

async function load(){
  const [re,ri,rc,rt]=await Promise.all([
    fetch(SB+'/rest/v1/empreendimentos?ativo=eq.true&select=*&order=nome',{headers:H}),
    fetch(SB+'/rest/v1/empreendimento_imagens?ativo=eq.true&select=empreendimento_id,tipo',{headers:{...H,'Range':'0-9999'}}),
    fetch(SB+'/rest/v1/empreendimento_imagens?ativo=eq.true&tipo=in.(fachada,perspectiva_3d)&select=empreendimento_id,url&order=ordem',{headers:{...H,'Range':'0-9999'}}),
    fetch(SB+'/rest/v1/tipologias?select=empreendimento_id,dormitorios,area_m2,num_suites,tem_varanda&order=dormitorios',{headers:H}).catch(()=>({json:()=>[]}))
  ]);
  const emps=await re.json(),imgs=await ri.json(),caps=await rc.json();
  let tipos=[];try{tipos=await rt.json();}catch(e){}
  if(!Array.isArray(emps)){document.getElementById('grid').innerHTML='<div class="loading" style="color:#e74c3c">Erro ao carregar</div>';return;}

  const st={},cm={},tp={};
  imgs.forEach(i=>{if(!st[i.empreendimento_id])st[i.empreendimento_id]={t:0,f:0};st[i.empreendimento_id].t++;if(['fachada','perspectiva_3d'].includes(i.tipo))st[i.empreendimento_id].f++;});
  caps.forEach(c=>{if(!cm[c.empreendimento_id])cm[c.empreendimento_id]=c.url;});
  if(Array.isArray(tipos))tipos.forEach(t=>{if(!tp[t.empreendimento_id])tp[t.empreendimento_id]=[];tp[t.empreendimento_id].push(t);});

  all=emps.map(emp=>({...emp,_total:st[emp.id]?.t||0,_fach:st[emp.id]?.f||0,_capa:cm[emp.id]||null,_tipos:tp[emp.id]||[]}));

  // Preencher dropdowns
  const fill=(id,vals)=>{const el=document.getElementById(id);vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;el.appendChild(o);});};
  fill('fStatus',[...new Set(all.map(e=>e.status).filter(Boolean))].sort());
  fill('fBairro',[...new Set(all.map(e=>e.bairro_comercial||e.bairro).filter(Boolean))].sort());
  fill('fInc',[...new Set(all.map(e=>e.incorporadora||e.construtora).filter(Boolean))].sort());
  fill('fProg',[...new Set(all.map(e=>e.programa).filter(Boolean))].sort());

  const totalFotos=all.reduce((a,e)=>a+e._total,0);
  document.getElementById('sTot').textContent=all.length;
  document.getElementById('sFotos').textContent=totalFotos.toLocaleString('pt-BR');
  const com6=all.filter(e=>e._total>=6).length;
  document.getElementById('sWith').textContent=com6+'/'+all.length+' com ≥6 fotos';

  flt();
}

function flt(){
  const q=document.getElementById('qBusca').value.toLowerCase();
  const st=document.getElementById('fStatus').value;
  const ba=document.getElementById('fBairro').value;
  const inc=document.getElementById('fInc').value;
  const prog=document.getElementById('fProg').value;
  const qrt=document.getElementById('fQ').value;
  const preco=document.getElementById('fPreco').value;
  const sort=document.getElementById('fSort').value;

  filt=all.filter(emp=>{
    if(q&&!(emp.nome+' '+(emp.incorporadora||emp.construtora)+' '+(emp.bairro_comercial||emp.bairro||'')).toLowerCase().includes(q))return false;
    if(st&&emp.status!==st)return false;
    if(ba&&(emp.bairro_comercial||emp.bairro)!==ba)return false;
    if(inc&&(emp.incorporadora||emp.construtora)!==inc)return false;
    if(prog&&emp.programa!==prog)return false;
    if(qrt){
      if(qrt==='studio'&&!emp.tem_studio)return false;
      else if(qrt==='1'&&!(emp.tipo_min_quartos<=1&&emp.tipo_max_quartos>=1))return false;
      else if(qrt==='2'&&!(emp.tipo_min_quartos<=2&&emp.tipo_max_quartos>=2))return false;
      else if(qrt==='3'&&!(emp.tipo_min_quartos<=3&&emp.tipo_max_quartos>=3))return false;
      else if(qrt==='4'&&!(emp.tipo_max_quartos>=4))return false;
    }
    if(preco){const[mn,mx]=preco.split('-').map(Number);const p=Number(emp.preco_min)||0;if(mn&&p<mn*1000)return false;if(mx&&p>mx*1000)return false;}
    if(af.mcmv&&!emp.enquadrado_mcmv)return false;
    if(af.dest&&!emp.destaque)return false;
    return true;
  });

  // Ordenar
  filt.sort((a,b)=>{
    if(sort==='nome')return a.nome.localeCompare(b.nome,'pt-BR');
    if(sort==='preco_asc')return (Number(a.preco_min)||999e9)-(Number(b.preco_min)||999e9);
    if(sort==='preco_desc')return (Number(b.preco_min)||0)-(Number(a.preco_min)||0);
    if(sort==='fotos_desc')return b._total-a._total;
    if(sort==='entrega')return (a.previsao_entrega||'9999').localeCompare(b.previsao_entrega||'9999');
    return 0;
  });

  document.getElementById('fCnt').textContent=filt.length;
  render();
}

function tgl(k){af[k]=!af[k];document.getElementById(k==='mcmv'?'bMCMV':'bDest').classList.toggle('on',af[k]);flt();}

function render(){
  const g=document.getElementById('grid');
  if(!filt.length){g.innerHTML='<div class="loading">Nenhum resultado</div>';return;}
  g.innerHTML=filt.map(emp=>{
    const ho=emp.observacao&&emp.observacao.trim();
    const img=emp._capa
      ?'<img class="card-img" src="'+e(emp._capa)+'" loading="lazy" alt="">'
      :'<div class="card-no-img">🏗</div>';

    // Tags
    const tags=[
      emp.status?'<span class="ctag ctag-status">'+e(emp.status.replace(/_/g,' '))+'</span>':'',
      emp.padrao?'<span class="ctag ctag-padrao">'+e(emp.padrao.toUpperCase())+'</span>':'',
    ].filter(Boolean).join('');

    // Tipologias
    let tipoHTML='';
    if(emp._tipos.length){
      const shown=emp._tipos.slice(0,3);
      const extra=emp._tipos.length-3;
      tipoHTML=shown.map(t=>'<span class="tipo-tag">'+(t.dormitorios?t.dormitorios+' dorm.'+(t.num_suites?' c/ suíte':''):'Studio')+(t.area_m2?' · '+t.area_m2+'m²':'')+'</span>').join('')
        +(extra>0?'<span class="tipo-tag more">+'+extra+'</span>':'');
    } else if(emp.tipo_min_quartos){
      const q=emp.tipo_min_quartos===emp.tipo_max_quartos?emp.tipo_min_quartos+' dorm.':emp.tipo_min_quartos+'–'+emp.tipo_max_quartos+' dorm.';
      const a=emp.area_min_m2?(emp.area_min_m2===emp.area_max_m2?emp.area_min_m2:emp.area_min_m2+'–'+emp.area_max_m2)+'m²':'';
      tipoHTML='<span class="tipo-tag">'+q+(a?' · '+a:'')+'</span>';
    }

    // Info grid
    const quartos=emp.tipo_min_quartos?(emp.tipo_min_quartos===emp.tipo_max_quartos?emp.tipo_min_quartos:emp.tipo_min_quartos+'–'+emp.tipo_max_quartos)+' dorm.':'—';
    const area=emp.area_min_m2?(emp.area_min_m2===emp.area_max_m2?emp.area_min_m2:emp.area_min_m2+'–'+emp.area_max_m2)+' m²':'—';
    const vagas=emp.num_vagas_min!=null?(emp.num_vagas_min===emp.num_vagas_max?emp.num_vagas_min:emp.num_vagas_min+'–'+emp.num_vagas_max):'—';
    const entrega=emp.mes_entrega||emp.previsao_entrega||'—';
    const obra=emp.fase_obra_pct!=null?emp.fase_obra_pct+'%':'—';
    const unids=emp.total_unidades||'—';

    const infoRow=`<div class="card-inforow">
      <div class="ci-item"><div class="ci-label">Área</div><div class="ci-value">${e(area)}</div></div>
      <div class="ci-item"><div class="ci-label">Dormitórios</div><div class="ci-value">${e(quartos)}</div></div>
      <div class="ci-item"><div class="ci-label">Vagas</div><div class="ci-value">${e(String(vagas))}</div></div>
      <div class="ci-item"><div class="ci-label">Unidades</div><div class="ci-value">${e(String(unids))}</div></div>
      <div class="ci-item"><div class="ci-label">Entrega</div><div class="ci-value">${e(entrega)}</div></div>
      <div class="ci-item"><div class="ci-label">Obra</div><div class="ci-value">${e(obra)}</div></div>
    </div>`;

    const obsPreview=ho?'<div class="obs-card-preview">💬 '+e(emp.observacao.trim())+'</div>':'';

    return '<div class="card'+(ho?' obs':'')+'" onclick="openM(\''+emp.id+'\')">'
      +'<div class="card-img-wrap">'+img
      +'<div class="card-count">📷 '+emp._total+'</div></div>'
      +'<div class="card-body">'
      +(tags?'<div class="card-tags">'+tags+'</div>':'')
      +'<div class="card-name">'+e(emp.nome)+'</div>'
      +'<div class="card-corp">'+e(emp.incorporadora||emp.construtora||'')+'</div>'
      +(tipoHTML?'<div class="card-tipologias">'+tipoHTML+'</div>':'')
      +infoRow
      +'<div class="card-price-row"><div class="card-price">'+brl(emp.preco_min)+'</div><div class="card-bairro">'+e(emp.bairro_comercial||emp.bairro||'—')+'</div></div>'
      +obsPreview
      +'</div></div>';
  }).join('');
}

function toggleLista(){
  isLista=!isLista;
  document.getElementById('grid').className='grid '+(isLista?'list':'g3');
  document.getElementById('btnLista').classList.toggle('on',isLista);
}

function exportCSV(){
  const cols=['nome','incorporadora','construtora','bairro_comercial','bairro','status','padrao','programa','area_min_m2','area_max_m2','tipo_min_quartos','tipo_max_quartos','preco_min','preco_max','previsao_entrega','total_unidades','fase_obra_pct','_total','_fach'];
  const esc2=v=>v==null?'':typeof v==='string'&&v.includes(',')? '"'+v+'"':String(v);
  const csv=cols.join(',')+'\n'+filt.map(r=>cols.map(c=>esc2(r[c])).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download='zona-leste-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

// ── MODAL DETALHE ──
async function openM(id){
  const emp=all.find(x=>x.id===id);
  if(!emp)return;
  document.getElementById('ovl').classList.add('open');
  document.getElementById('mBox').innerHTML='<div style="padding:30px;text-align:center;color:var(--mt)">Carregando…</div>';
  document.getElementById('ovl').scrollTop=0;
  const r=await fetch(SB+'/rest/v1/empreendimento_imagens?empreendimento_id=eq.'+id+'&ativo=eq.true&select=url,tipo,ordem&order=tipo,ordem',{headers:H});
  curImgs=await r.json();curIdx=0;
  buildM(emp);
}

function row(l,val,cls){val=v(val);if(val==='—')return '';return '<div class="mib"><div class="mil">'+e(l)+'</div><div class="miv'+(cls?' '+cls:'')+'">'+val+'</div></div>';}
function rowB(l,val){return '<div class="mib"><div class="mil">'+e(l)+'</div><div class="miv">'+bool(val)+'</div></div>';}
function rowFW(l,val){val=v(val);if(val==='—')return '';return '<div class="mifw"><div class="mil">'+e(l)+'</div><div class="miv sm">'+e(val)+'</div></div>';}
function brl2(n){return n?'R$ '+Number(n).toLocaleString('pt-BR'):'—';}

function buildM(emp){
  const id=emp.id;
  const nF=curImgs.filter(i=>['fachada','perspectiva_3d'].includes(i.tipo)).length;
  const nL=curImgs.filter(i=>i.tipo==='lazer').length;
  const nI=curImgs.filter(i=>i.tipo==='interiores').length;
  const nP=curImgs.filter(i=>i.tipo==='planta').length;

  const gal=curImgs.length
    ?'<div class="gallery"><img class="gal-main" id="gMain" src="'+e(curImgs[0].url)+'" alt="">'
     +'<button class="gnav gprev" onclick="navI(-1)">‹</button><button class="gnav gnext" onclick="navI(1)">›</button>'
     +'<div class="gcnt" id="gCnt">1 / '+curImgs.length+'</div></div>'
     +'<div class="thumbs" id="tRow">'+curImgs.map((i,x)=>'<img class="thumb'+(x===0?' on':'')+'" src="'+e(i.url)+'" loading="lazy" onclick="goI('+x+')" title="'+i.tipo+' #'+i.ordem+'" alt="">').join('')+'</div>'
    :'<div class="gallery"><div class="gal-no-img">📷</div></div>';

  const q=emp.tipo_min_quartos?((emp.tipo_min_quartos===emp.tipo_max_quartos?emp.tipo_min_quartos:emp.tipo_min_quartos+'–'+emp.tipo_max_quartos)+' dorm.'):'—';
  const ar=emp.area_min_m2?((emp.area_min_m2===emp.area_max_m2?emp.area_min_m2:emp.area_min_m2+'–'+emp.area_max_m2)+'m²'):'—';
  const vg=emp.num_vagas_min!=null?((emp.num_vagas_min===emp.num_vagas_max?emp.num_vagas_min:emp.num_vagas_min+'–'+emp.num_vagas_max)+' vaga(s)'):'—';

  document.getElementById('mBox').innerHTML=gal+`<div class="modal-body">
  <div class="modal-top">
    <div><div class="modal-title">${e(emp.nome)}</div>
    <div class="modal-meta">${e(emp.incorporadora||emp.construtora||'')}${emp.selo?' · '+e(emp.selo):''} · 📍 ${e(emp.bairro_comercial||emp.bairro||'—')}</div></div>
    <button class="mclose" onclick="closeM()">×</button>
  </div>
  <div class="msec"><div class="msec-title yw">💬 Observação de auditoria</div>
    <textarea class="obs-ta" id="obsTA" placeholder="Descreva o que está errado ou precisa ser corrigido…">${e(emp.observacao||'')}</textarea>
    <div class="obs-foot"><button class="bsv" id="bsvB" onclick="saveO('${id}')">💾 Salvar</button>
    <button class="bclr" onclick="clrO('${id}')">Limpar</button><span class="ost" id="ostM"></span></div></div>
  <div class="msec"><div class="msec-title">📷 Imagens</div><div class="mig">
    ${row('Total ativo',emp._total+(emp._total<6?' ⚠':''),emp._total<6?'warn':'ok')}
    ${row('Fachada/3D',nF,nF===0?'warn':'ac')}${row('Lazer',nL,'ac')}${row('Interiores',nI,'ac')}${row('Plantas',nP,'ac')}
  </div></div>
  <div class="msec"><div class="msec-title">🏠 Apartamento</div><div class="mig">
    ${row('Área',ar)}${row('Quartos',q)}${row('Suítes (máx)',v(emp.num_suites_max))}
    ${row('Banheiros (máx)',v(emp.num_banheiros_max))}${row('Vagas',vg)}${rowB('Varanda',emp.tem_varanda)}
    ${rowB('Studio',emp.tem_studio)}${rowB('Depósito',emp.tem_deposito)}${rowB('Arm. embutido',emp.tem_armario_embutido)}
    ${rowB('Infra ar-cond.',emp.infra_ar_condicionado)}${rowB('Aquec. gás',emp.aquecimento_central_gas)}
    ${rowB('Fechad. biométrica',emp.fechadura_biometrica)}${rowB('Tomada USB',emp.tomada_usb)}
    ${rowB('Vaso dual flush',emp.vaso_dual_flush)}${row('Metais',v(emp.marca_metais))}
    ${row('Piso',v(emp.acabamento_piso))}${row('Banheiro',v(emp.acabamento_banheiro))}
    ${rowFW('Diferenciais',emp.diferenciais_apto)}
  </div></div>
  <div class="msec"><div class="msec-title">💰 Preços</div><div class="mig">
    ${row('Preço mín.',brl2(emp.preco_min))}${row('Preço máx.',brl2(emp.preco_max))}
    ${row('R$/m² mín.',brl2(emp.preco_m2_min))}${row('R$/m² máx.',brl2(emp.preco_m2_max))}
    ${row('Condomínio est.',brl2(emp.condominio_estimado))}${row('IPTU est./ano',brl2(emp.iptu_estimado_anual))}
    ${rowB('FGTS',emp.aceita_fgts)}${rowB('Financiamento',emp.aceita_financiamento)}
    ${rowFW('Bancos',emp.bancos_financiamento)}
    ${rowB('MCMV',emp.enquadrado_mcmv)}${row('Faixa MCMV',v(emp.faixa_mcmv))}
  </div></div>
  <div class="msec"><div class="msec-title">🏗 Empreendimento</div><div class="mig">
    ${row('Unidades',v(emp.total_unidades))}${row('Torres',v(emp.num_torres))}${row('Pavimentos',v(emp.num_pavimentos))}
    ${row('Aptos/andar',v(emp.aptos_por_andar))}${row('Elevadores',v(emp.num_elevadores))}
    ${row('Terreno',emp.area_terreno_m2?emp.area_terreno_m2+'m²':'—')}${row('Lazer',emp.area_lazer_m2?emp.area_lazer_m2+'m²':'—')}
    ${row('Fase obra',emp.fase_obra_pct!=null?emp.fase_obra_pct+'%':'—')}
    ${rowB('Rooftop',emp.rooftop)}${rowB('Heliponto',emp.heliponto)}${rowB('Tour virtual',emp.tem_tour_virtual)}
    ${row('Cert. ambiental',v(emp.certificacao_ambiental))}${row('Padrão',v(emp.padrao))}
    ${row('Arquiteto',v(emp.arquiteto))}${row('Paisagista',v(emp.paisagista))}
    ${rowFW('Sist. construtivo',emp.sistema_construtivo)}
  </div></div>
  <div class="msec"><div class="msec-title">📅 Linha do Tempo</div><div class="mig">
    ${row('Status',v(emp.status))}${row('Etapa',v(emp.estagio_linha_tempo))}
    ${row('Lançamento',v(emp.data_lancamento))}${row('Início obras',v(emp.data_inicio_obras))}
    ${row('Entrega',v(emp.mes_entrega||emp.previsao_entrega))}${row('Atualização',v(emp.data_atualizacao_anuncio))}
  </div></div>
  <div class="msec"><div class="msec-title">📍 Localização</div><div class="mig">
    ${row('Bairro',v(emp.bairro))}${row('Bairro comercial',v(emp.bairro_comercial))}
    ${row('Subprefeitura',v(emp.subprefeitura))}${row('CEP',v(emp.cep))}
    ${row('Metrô',emp.nome_metro_proximo?(emp.nome_metro_proximo+(emp.dist_metro_metros?' ('+emp.dist_metro_metros+'m)':'')):'—')}
    ${row('Linha metrô',v(emp.linha_metro))}
    ${row('Ônibus',emp.ponto_onibus_proximo?(emp.ponto_onibus_proximo+(emp.dist_onibus_metros?' ('+emp.dist_onibus_metros+'m)':'')):'—')}
    ${rowFW('Endereço',emp.logradouro?(emp.logradouro+(emp.numero?', '+emp.numero:'')):'—')}
    ${rowFW('Pontos de interesse',emp.pontos_interesse)}
  </div></div>
  <div class="msec"><div class="msec-title">📋 Dados Legais</div><div class="mig">
    ${row('Cód. ref.',v(emp.codigo_referencia))}${row('Incorporadora',v(emp.incorporadora))}
    ${rowFW('CNPJ',emp.cnpj_incorporadora)}${rowFW('Registro incorporação',emp.registro_incorporacao)}
    ${rowFW('Cartório RI',emp.cartorio_ri)}${rowFW('Fonte dos dados',emp.fonte_dados)}
  </div></div>
  ${emp.observacoes?'<div class="msec"><div class="msec-title">📝 Notas técnicas</div><div class="mig">'+rowFW('',emp.observacoes)+'</div></div>':''}
  ${[['apto.vc',emp.url_apto_vc],['Lopes',emp.url_lopes],['ZAP',emp.url_zap],['Viva Real',emp.url_vivareal],['Segundo Imóvel',emp.url_segundo_imovel],['YouTube',emp.url_video_youtube]].filter(([,u])=>u&&!u.includes('google.com/search')).length?
    '<div class="msec"><div class="msec-title">🔗 Links</div><div class="lnks">'+
    [['apto.vc',emp.url_apto_vc],['Lopes',emp.url_lopes],['ZAP',emp.url_zap],['Viva Real',emp.url_vivareal],['Segundo Imóvel',emp.url_segundo_imovel],['YouTube',emp.url_video_youtube]]
    .filter(([,u])=>u&&!u.includes('google.com/search'))
    .map(([l,u])=>'<a class="lnk" href="'+e(u)+'" target="_blank">🔗 '+e(l)+'</a>').join('')+'</div></div>':''}
</div>`;
}

function navI(d){if(!curImgs.length)return;curIdx=(curIdx+d+curImgs.length)%curImgs.length;goI(curIdx);}
function goI(i){curIdx=i;document.getElementById('gMain').src=curImgs[i].url;document.getElementById('gCnt').textContent=(i+1)+' / '+curImgs.length;document.querySelectorAll('.thumb').forEach((t,x)=>t.classList.toggle('on',x===i));const tr=document.getElementById('tRow');if(tr){const th=tr.querySelectorAll('.thumb')[i];if(th)th.scrollIntoView({inline:'center',behavior:'smooth'});}}
function closeM(){document.getElementById('ovl').classList.remove('open');}

async function saveO(id){
  const txt=document.getElementById('obsTA').value.trim();
  const btn=document.getElementById('bsvB'),st=document.getElementById('ostM');
  btn.disabled=true;btn.textContent='Salvando…';
  try{
    const r=await fetch(SB+'/rest/v1/empreendimentos?id=eq.'+id,{method:'PATCH',headers:{...H,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify({observacao:txt||null})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const emp=all.find(x=>x.id===id);if(emp)emp.observacao=txt;
    st.className='ost ok';st.textContent='✓ Salvo';setTimeout(()=>{st.textContent='';st.className='ost';},3000);
    render();
  }catch(err){st.className='ost er';st.textContent='✗ '+err.message;}
  finally{btn.disabled=false;btn.textContent='💾 Salvar';}
}
function clrO(id){document.getElementById('obsTA').value='';saveO(id);}

document.addEventListener('keydown',ev=>{
  if(document.getElementById('ovl').classList.contains('open')){
    if(ev.key==='Escape')closeM();
    else if(ev.key==='ArrowLeft')navI(-1);
    else if(ev.key==='ArrowRight')navI(1);
  }
});

load();
</script>
