<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zona Leste Imóveis — Auditoria</title>
<style>
:root{--bg:#0f1117;--s:#181c27;--s2:#1f2438;--bd:#2a3050;--ac:#4f7dff;--ac2:#ff6b35;--w:#f5a623;--ok:#2ecc71;--t:#e8ecf4;--mt:#7a869e;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
header{background:linear-gradient(135deg,#0d1220,#1a2040);border-bottom:1px solid var(--bd);padding:16px 20px;position:sticky;top:0;z-index:100}
.hi{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-size:17px;font-weight:700;cursor:pointer}.logo span{color:var(--ac)}
.hstats{display:flex;gap:20px;margin-left:auto}
.hn{font-size:20px;font-weight:700;color:var(--ac);line-height:1}
.hl{font-size:10px;color:var(--mt);text-transform:uppercase;letter-spacing:.5px}
.ctrl{max-width:1400px;margin:16px auto 0;padding:0 16px;display:flex;gap:8px;flex-wrap:wrap}
input,select{background:var(--s);border:1px solid var(--bd);border-radius:8px;color:var(--t);padding:8px 12px;font-size:13px;outline:none;transition:border-color .2s}
input{flex:1;min-width:200px}
input:focus,select:focus{border-color:var(--ac)}
.fbtn{background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--t);padding:8px 12px;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.fbtn:hover{border-color:var(--ac);color:var(--ac)}.fbtn.on{background:var(--ac);border-color:var(--ac);color:#fff}
.cbar{max-width:1400px;margin:8px auto 0;padding:0 16px;font-size:11px;color:var(--mt)}
.grid{max-width:1400px;margin:16px auto;padding:0 16px 40px;display:grid;gap:14px}
@media(min-width:580px){.grid{grid-template-columns:1fr 1fr}}
@media(min-width:860px){.grid{grid-template-columns:1fr 1fr 1fr}}
@media(min-width:1200px){.grid{grid-template-columns:repeat(4,1fr)}}
.card{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:box-shadow .2s,border-color .2s,transform .15s}
.card:hover{box-shadow:0 4px 20px rgba(79,125,255,.15);border-color:#3a4870;transform:translateY(-2px)}
.card.obs{border-color:var(--w)}
.ci{width:100%;height:150px;object-fit:cover;display:block;background:var(--s2)}
.cp{width:100%;height:150px;background:var(--s2);display:flex;align-items:center;justify-content:center;color:var(--mt);font-size:32px}
.cb{padding:11px 13px;flex:1;display:flex;flex-direction:column;gap:5px}
.cn{font-size:12.5px;font-weight:600;line-height:1.3}
.cc,.cd{font-size:11px;color:var(--mt)}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.bn{background:rgba(79,125,255,.15);color:var(--ac)}.bw{background:rgba(255,107,53,.15);color:var(--ac2)}.bok{background:rgba(46,204,113,.12);color:var(--ok)}
.obs-preview{margin-top:6px;font-size:11px;color:var(--w);font-style:italic;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.loading{text-align:center;padding:60px;color:var(--mt);font-size:14px;grid-column:1/-1}

/* DETALHE */
#detailView{display:none;max-width:1400px;margin:0 auto;padding:16px 16px 40px}
.dbk{background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--mt);padding:7px 14px;cursor:pointer;font-size:13px;margin-bottom:16px;display:inline-flex;align-items:center;gap:6px}
.dbk:hover{border-color:var(--ac);color:var(--ac)}
.dcard{background:var(--s);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.dh{background:linear-gradient(135deg,#0d1220,#1a2040);padding:20px 24px}
.dh h1{font-size:20px;font-weight:700;margin-bottom:4px}
.dh p{font-size:13px;color:var(--mt)}
.db{padding:20px 24px;display:flex;flex-direction:column;gap:22px}
.sec-title{font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.6px;padding-bottom:8px;border-bottom:1px solid var(--bd);margin-bottom:12px}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.ibox{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px}
.il{font-size:10px;color:var(--mt);margin-bottom:3px}
.iv{font-size:13px;font-weight:600}.iv.ok{color:var(--ok)}.iv.warn{color:var(--ac2)}.iv.ac{color:var(--ac)}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.iitem{border-radius:8px;overflow:hidden;border:1px solid var(--bd);background:var(--s2);position:relative}
.iitem img{width:100%;height:110px;object-fit:cover;display:block;cursor:zoom-in;transition:opacity .2s}
.iitem img:hover{opacity:.8}
.itipo{font-size:9px;color:var(--mt);padding:3px 7px;background:rgba(0,0,0,.5);position:absolute;bottom:0;left:0;right:0}
.obs-box-d{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--t);padding:10px 12px;font-size:13px;min-height:80px;resize:vertical;outline:none;font-family:inherit;line-height:1.5;transition:border-color .2s}
.obs-box-d:focus{border-color:var(--w)}
.obs-box-d::placeholder{color:#3a4a66}
.oact{display:flex;gap:8px;margin-top:8px;align-items:center}
.bsv{background:var(--ac);color:#fff;border:none;border-radius:7px;padding:7px 18px;font-size:12px;font-weight:600;cursor:pointer}
.bsv:disabled{opacity:.4}
.bclr{background:var(--s2);color:var(--mt);border:1px solid var(--bd);border-radius:7px;padding:7px 12px;font-size:12px;cursor:pointer}
.bclr:hover{border-color:#e74c3c;color:#e74c3c}
.ost{font-size:11px;color:var(--mt)}.ost.ok{color:var(--ok)}.ost.er{color:#e74c3c}

/* LIGHTBOX */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:300;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb img{max-width:95vw;max-height:92vh;object-fit:contain;border-radius:6px}
.lbx{position:fixed;top:14px;right:18px;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:22px;cursor:pointer;border-radius:8px;padding:2px 12px;z-index:301}
</style>
</head>
<body>
<header>
  <div class="hi">
    <div class="logo" onclick="showList()">Zona Leste <span>Imóveis</span></div>
    <div style="font-size:11px;color:var(--mt)" id="hSub">Auditoria · clique no card para ver detalhes completos</div>
    <div class="hstats">
      <div><div class="hn" id="sT">—</div><div class="hl">total</div></div>
      <div><div class="hn" id="sO" style="color:var(--w)">—</div><div class="hl">com obs</div></div>
      <div><div class="hn" id="sS">—</div><div class="hl">exibidos</div></div>
    </div>
  </div>
</header>

<!-- LISTA -->
<div id="listView">
  <div class="ctrl">
    <input type="text" id="qS" placeholder="🔍  Nome, construtora, bairro..." oninput="flt()">
    <select id="qO" onchange="flt()">
      <option value="">Todos</option>
      <option value="com">Com observação</option>
      <option value="sem">Sem observação</option>
    </select>
    <button class="fbtn" id="bP" onclick="tgl('p')">📷 &lt;6 fotos</button>
    <button class="fbtn" id="bF" onclick="tgl('f')">🏢 Sem fachada</button>
  </div>
  <div class="cbar" id="cB"></div>
  <div class="grid" id="grid"><div class="loading">Carregando empreendimentos…</div></div>
</div>

<!-- DETALHE -->
<div id="detailView">
  <button class="dbk" onclick="showList()">← Voltar à lista</button>
  <div class="dcard">
    <div class="dh"><h1 id="dNome"></h1><p id="dSub"></p></div>
    <div class="db" id="dBody"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lb" id="lb" onclick="closeLB()">
  <button class="lbx" onclick="closeLB()">×</button>
  <img id="lbImg" src="" alt="">
</div>

<script>
const SB='https://xmnggeptpwxsmcartyzt.supabase.co';
const K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhtbmdnZXB0cHd4c21jYXJ0eXp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NjkzMzIsImV4cCI6MjA5NzE0NTMzMn0.2HWGvTAuEuzEHXcEbOr9t0gC1yc765lxQxk080EDmfg';
const H={apikey:K,Authorization:'Bearer '+K};
let all=[],af={p:false,f:false};

function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(n){return n?'R$ '+Number(n).toLocaleString('pt-BR'):'—';}

async function load(){
  const SELECT='id,nome,construtora,incorporadora,bairro,bairro_comercial,status,programa,observacao,'
    +'area_min_m2,area_max_m2,tipo_min_quartos,tipo_max_quartos,num_suites_max,'
    +'preco_min,preco_max,preco_m2_min,preco_m2_max,condominio_estimado,'
    +'total_unidades,num_torres,num_pavimentos,aptos_por_andar,num_vagas_min,num_vagas_max,'
    +'data_lancamento,previsao_entrega,estagio_linha_tempo,fase_obra_pct,'
    +'tem_varanda,tem_studio,tem_tour_virtual,aceita_fgts,aceita_financiamento,'
    +'enquadrado_mcmv,faixa_mcmv,url_video_youtube,url_apto_vc,diferenciais_apto,'
    +'logradouro,numero,cep,latitude,longitude,dist_metro_metros,nome_metro_proximo';

  const [re,ri,rc]=await Promise.all([
    fetch(SB+'/rest/v1/empreendimentos?ativo=eq.true&select='+SELECT+'&order=nome',{headers:H}),
    fetch(SB+'/rest/v1/empreendimento_imagens?ativo=eq.true&select=empreendimento_id,tipo',{headers:{...H,'Range':'0-9999'}}),
    fetch(SB+'/rest/v1/empreendimento_imagens?ativo=eq.true&tipo=in.(fachada,perspectiva_3d)&select=empreendimento_id,url&order=ordem',{headers:{...H,'Range':'0-9999'}})
  ]);
  const emps=await re.json(),imgs=await ri.json(),caps=await rc.json();
  if(!Array.isArray(emps)){console.error('Erro ao carregar:',emps);document.getElementById('grid').innerHTML='<div class="loading" style="color:#e74c3c">Erro ao carregar: '+(emps.message||JSON.stringify(emps))+'</div>';return;}
  const st={},cm={};
  imgs.forEach(i=>{if(!st[i.empreendimento_id])st[i.empreendimento_id]={t:0,f:0};st[i.empreendimento_id].t++;if(['fachada','perspectiva_3d'].includes(i.tipo))st[i.empreendimento_id].f++;});
  caps.forEach(c=>{if(!cm[c.empreendimento_id])cm[c.empreendimento_id]=c.url;});
  all=emps.map(emp=>({...emp,total:st[emp.id]?.t||0,fach:st[emp.id]?.f||0,capa:cm[emp.id]||null}));
  document.getElementById('sT').textContent=all.length;
  render();
}

function render(){
  const q=document.getElementById('qS').value.toLowerCase();
  const fo=document.getElementById('qO').value;
  const sh=all.filter(emp=>{
    if(q&&!(emp.nome+' '+emp.construtora+' '+emp.bairro).toLowerCase().includes(q))return false;
    if(fo==='com'&&!(emp.observacao&&emp.observacao.trim()))return false;
    if(fo==='sem'&&(emp.observacao&&emp.observacao.trim()))return false;
    if(af.p&&emp.total>=6)return false;
    if(af.f&&emp.fach>0)return false;
    return true;
  });
  document.getElementById('sO').textContent=all.filter(emp=>emp.observacao&&emp.observacao.trim()).length;
  document.getElementById('sS').textContent=sh.length;
  document.getElementById('cB').textContent='Mostrando '+sh.length+' de '+all.length+' empreendimentos';
  const g=document.getElementById('grid');
  if(!sh.length){g.innerHTML='<div class="loading">Nenhum resultado</div>';return;}
  g.innerHTML=sh.map(emp=>{
    const ho=emp.observacao&&emp.observacao.trim();
    const img=emp.capa?'<img class="ci" src="'+e(emp.capa)+'" loading="lazy" alt="">':'<div class="cp">🏗</div>';
    const bn=emp.total<6?'<span class="badge bw">⚠ '+emp.total+' fotos</span>':'<span class="badge bn">'+emp.total+' fotos</span>';
    const bf=emp.fach===0?'<span class="badge bw">Sem fachada</span>':'<span class="badge bok">🏢 '+emp.fach+'</span>';
    const op=ho?'<div class="obs-preview">💬 '+e(emp.observacao.trim())+'</div>':'';
    return '<div class="card'+(ho?' obs':'')+'" onclick="openDetail(\''+emp.id+'\')">'+img
      +'<div class="cb"><div class="cn">'+e(emp.nome)+'</div>'
      +'<div class="cc">'+e(emp.construtora)+'</div>'
      +'<div class="cd">📍 '+e(emp.bairro||'—')+'</div>'
      +'<div class="badges">'+bn+bf+'</div>'+op+'</div></div>';
  }).join('');
}

function flt(){render();}
function tgl(k){af[k]=!af[k];document.getElementById(k==='p'?'bP':'bF').classList.toggle('on',af[k]);render();}

async function openDetail(id){
  const emp=all.find(x=>x.id===id);
  if(!emp)return;
  document.getElementById('listView').style.display='none';
  document.getElementById('detailView').style.display='block';
  document.getElementById('hSub').textContent='← clique no logo para voltar';
  document.getElementById('dNome').textContent=emp.nome;
  document.getElementById('dSub').textContent=(emp.construtora||'')+(emp.bairro?' · 📍 '+emp.bairro:'');
  const body=document.getElementById('dBody');
  body.innerHTML='<div style="color:var(--mt);font-size:13px">Carregando imagens…</div>';
  window.scrollTo(0,0);

  // Buscar imagens
  const r=await fetch(SB+'/rest/v1/empreendimento_imagens?empreendimento_id=eq.'+id+'&ativo=eq.true&select=url,tipo,ordem&order=ordem',{headers:H});
  const imgs=await r.json();
  const nFach=imgs.filter(i=>['fachada','perspectiva_3d'].includes(i.tipo)).length;
  const nLaz=imgs.filter(i=>i.tipo==='lazer').length;
  const nInt=imgs.filter(i=>i.tipo==='interiores').length;
  const nPla=imgs.filter(i=>i.tipo==='planta').length;

  // Montar info boxes
  const infos=[
    ['Total de fotos', emp.total+(emp.total<6?' ⚠':''), emp.total<6?'warn':'ok'],
    ['Fachada/3D', nFach, nFach===0?'warn':'ac'],
    ['Lazer', nLaz, 'ac'],
    ['Interiores', nInt, 'ac'],
    ['Plantas', nPla, 'ac'],
    emp.status?['Status', emp.status,'']:null,
    emp.programa?['Programa', emp.programa,'']:null,
    emp.area_min_m2?['Área', emp.area_min_m2+(emp.area_max_m2&&emp.area_max_m2!==emp.area_min_m2?' – '+emp.area_max_m2:'')+'m²','']:null,
    emp.tipo_min_quartos?['Quartos', emp.tipo_min_quartos+(emp.tipo_max_quartos&&emp.tipo_max_quartos!==emp.tipo_min_quartos?' – '+emp.tipo_max_quartos:''),'']:null,
    emp.num_suites_max?['Suítes (máx)', emp.num_suites_max,'']:null,
    emp.preco_min?['Preço min', fmt(emp.preco_min),'']:null,
    emp.preco_max?['Preço máx', fmt(emp.preco_max),'']:null,
    emp.preco_m2_min?['R$/m² min', fmt(emp.preco_m2_min),'']:null,
    emp.condominio_estimado?['Condomínio est.', fmt(emp.condominio_estimado),'']:null,
    emp.total_unidades?['Total unidades', emp.total_unidades,'']:null,
    emp.num_torres?['Torres', emp.num_torres,'']:null,
    emp.num_pavimentos?['Pavimentos', emp.num_pavimentos,'']:null,
    emp.num_vagas_min!=null?['Vagas', emp.num_vagas_min+(emp.num_vagas_max&&emp.num_vagas_max!==emp.num_vagas_min?' – '+emp.num_vagas_max:''),'']:null,
    emp.data_lancamento?['Lançamento', emp.data_lancamento,'']:null,
    emp.previsao_entrega?['Previsão entrega', emp.previsao_entrega,'']:null,
    emp.fase_obra_pct!=null?['Obra', emp.fase_obra_pct+'%','']:null,
    emp.dist_metro_metros?['Metrô', emp.nome_metro_proximo+' ('+Math.round(emp.dist_metro_metros)+'m)','']:null,
    emp.aceita_fgts?['FGTS', emp.aceita_fgts?'✓':'—','']:null,
    emp.enquadrado_mcmv?['MCMV', emp.faixa_mcmv||'Sim','']:null,
  ].filter(Boolean);

  const infoHTML='<div><div class="sec-title">Informações</div><div class="info-grid">'
    +infos.map(([l,v,c])=>'<div class="ibox"><div class="il">'+e(l)+'</div><div class="iv'+(c?' '+c:'')+'">'+e(v)+'</div></div>').join('')
    +'</div></div>';

  // Diferenciais
  let difHTML='';
  if(emp.diferenciais_apto){
    difHTML='<div><div class="sec-title">Diferenciais do apartamento</div><div style="font-size:12px;color:var(--t);line-height:1.7">'+e(emp.diferenciais_apto)+'</div></div>';
  }

  // Links
  const links=[
    emp.url_apto_vc?['apto.vc',emp.url_apto_vc]:null,
    emp.url_video_youtube?['Vídeo YouTube',emp.url_video_youtube]:null,
  ].filter(Boolean);
  let linksHTML='';
  if(links.length){
    linksHTML='<div><div class="sec-title">Links</div><div style="display:flex;gap:8px;flex-wrap:wrap">'
      +links.map(([l,u])=>'<a href="'+e(u)+'" target="_blank" style="background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:6px 12px;font-size:12px;color:var(--ac);text-decoration:none">🔗 '+e(l)+'</a>').join('')
      +'</div></div>';
  }

  // Galeria por tipo
  const TIPOS={fachada:'Fachada / Exterior',perspectiva_3d:'Perspectiva 3D',lazer:'Áreas de Lazer',interiores:'Interiores',planta:'Plantas Baixas'};
  let galHTML='';
  for(const [tipo,label] of Object.entries(TIPOS)){
    const list=imgs.filter(i=>i.tipo===tipo);
    if(!list.length)continue;
    galHTML+='<div><div class="sec-title">'+label+' ('+list.length+')</div>'
      +'<div class="img-grid">'
      +list.map(i=>'<div class="iitem"><img src="'+e(i.url)+'" loading="lazy" onclick="openLB(\''+e(i.url)+'\')" alt="'+label+'"><div class="itipo">ord='+i.ordem+'</div></div>').join('')
      +'</div></div>';
  }
  // Outros tipos
  const outros=imgs.filter(i=>!Object.keys(TIPOS).includes(i.tipo));
  if(outros.length){
    galHTML+='<div><div class="sec-title">Outras ('+outros.length+')</div><div class="img-grid">'
      +outros.map(i=>'<div class="iitem"><img src="'+e(i.url)+'" loading="lazy" onclick="openLB(\''+e(i.url)+'\')" alt=""><div class="itipo">'+i.tipo+' ord='+i.ordem+'</div></div>').join('')
      +'</div></div>';
  }
  if(!imgs.length) galHTML='<div style="color:var(--mt);font-size:13px">Nenhuma imagem ativa.</div>';

  // Observação
  const obsHTML=`<div style="background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:14px">
    <div class="sec-title">Observação / Problema a corrigir</div>
    <textarea class="obs-box-d" id="obsTA" placeholder="Descreva o que está errado ou precisa ser corrigido…">${e(emp.observacao||'')}</textarea>
    <div class="oact">
      <button class="bsv" id="bsvBtn" onclick="saveObs('${id}')">💾 Salvar</button>
      <button class="bclr" onclick="clrObs('${id}')">Limpar</button>
      <span class="ost" id="ostMsg"></span>
    </div>
  </div>`;

  body.innerHTML=infoHTML+difHTML+linksHTML+obsHTML+galHTML;
}

function showList(){
  document.getElementById('detailView').style.display='none';
  document.getElementById('listView').style.display='';
  document.getElementById('hSub').textContent='Auditoria · clique no card para ver detalhes completos';
  window.scrollTo(0,0);
}

async function saveObs(id){
  const txt=document.getElementById('obsTA').value.trim();
  const btn=document.getElementById('bsvBtn');
  const msg=document.getElementById('ostMsg');
  btn.disabled=true;btn.textContent='Salvando…';
  try{
    const r=await fetch(SB+'/rest/v1/empreendimentos?id=eq.'+id,{method:'PATCH',headers:{...H,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify({observacao:txt||null})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const emp=all.find(x=>x.id===id);
    if(emp)emp.observacao=txt;
    document.getElementById('sO').textContent=all.filter(x=>x.observacao&&x.observacao.trim()).length;
    msg.className='ost ok';msg.textContent='✓ Salvo';
    setTimeout(()=>{msg.textContent='';msg.className='ost';},3000);
  }catch(err){msg.className='ost er';msg.textContent='✗ '+err.message;}
  finally{btn.disabled=false;btn.textContent='💾 Salvar';}
}
function clrObs(id){document.getElementById('obsTA').value='';saveObs(id);}
function openLB(url){document.getElementById('lbImg').src=url;document.getElementById('lb').classList.add('open');}
function closeLB(){document.getElementById('lb').classList.remove('open');}
