<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bairro — Zona Leste Lançamentos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,500;1,6..72,600&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<script src="bairros-data.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'General Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  :root{
    --bg:#FFFFFF;--text:#111111;--muted:#6B6F76;--red:#9E1B1B;--gold:#C9A227;
    --glass:rgba(255,255,255,.65);--glass-brd:rgba(17,17,17,.08);
    --card:#FFFFFF;--card-brd:rgba(17,17,17,.09);--surface:#F6F6F4;
    --shadow:0 12px 40px rgba(17,17,17,.10);--ph1:#EDEBE6;--ph2:#E2DFD8;
  }
  [data-theme="dark"]{
    --bg:#0B0D10;--text:#FFFFFF;--muted:#A8ACB3;
    --glass:rgba(16,19,24,.55);--glass-brd:rgba(255,255,255,.12);
    --card:#12151A;--card-brd:rgba(255,255,255,.10);--surface:#111418;
    --shadow:0 16px 44px rgba(0,0,0,.55);--ph1:#1A1E24;--ph2:#22272E;
  }
  a{color:var(--red);text-decoration:none}
  a:hover{color:var(--gold)}
  .serif{font-family:'Newsreader',Georgia,serif;font-style:italic;font-weight:500}
  .reveal-init{opacity:0;transform:translateY(34px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);will-change:opacity,transform}
  .reveal-in{opacity:1 !important;transform:none}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}
  .hoverop:hover{opacity:1 !important;background:var(--surface)}
  .hovertheme:hover{filter:brightness(1.08)}
  .hoverlogin:hover{background:var(--gold) !important;color:#111 !important}
  .hoverlogin:hover .arrow{transform:translateX(3px)}
  .btn-red:hover{background:var(--gold) !important;color:#111 !important}
  .ecard{transition:transform .35s cubic-bezier(.2,.7,.2,1),box-shadow .35s cubic-bezier(.2,.7,.2,1)}
  .ecard:hover{transform:translateY(-6px);box-shadow:0 30px 56px -18px rgba(17,17,17,.48)}
  #loadOverlay{position:fixed;inset:0;background:var(--bg);z-index:99999;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px}
  .credit{position:absolute;right:8px;bottom:8px;font-size:10.5px;color:#fff;background:rgba(0,0,0,.5);padding:3px 8px;border-radius:6px;backdrop-filter:blur(4px)}
</style>
</head>
<body>

<div id="loadOverlay">Carregando bairro…</div>

<div id="root" data-theme="light" style="min-height:100vh;background:var(--bg);color:var(--text);transition:background .3s,color .3s;overflow-x:hidden;display:none">
  <header style="position:fixed;top:0;left:0;right:0;z-index:50;background:transparent;padding-top:20px">
    <div style="display:flex;align-items:center;justify-content:center;padding:0 20px">
      <div style="display:flex;align-items:center;gap:6px;background:var(--glass);border:1px solid var(--glass-brd);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:8px 8px 8px 16px;border-radius:999px;box-shadow:0 8px 30px rgba(0,0,0,.12)">
        <a href="novo-index.html" style="display:flex;align-items:center;gap:9px;padding-right:6px">
          <span style="width:30px;height:30px;border-radius:8px;background:var(--red);display:grid;place-items:center;color:#fff;font-weight:700;font-size:14px">ZL</span>
          <span style="font-weight:600;font-size:15.5px;letter-spacing:-.01em;white-space:nowrap;color:var(--text)">Zona Leste</span>
        </a>
        <nav style="display:flex;align-items:center;gap:2px">
          <a href="empreendimentos.html" class="hoverop" style="padding:8px 15px;border-radius:999px;font-size:14px;font-weight:500;color:var(--text);opacity:.82;white-space:nowrap">Empreendimentos</a>
          <a href="bairros.html" style="padding:8px 15px;border-radius:999px;font-size:14px;font-weight:600;color:var(--red);white-space:nowrap;background:var(--surface)">Bairros</a>
          <a href="novo-index.html#numeros" class="hoverop" style="padding:8px 15px;border-radius:999px;font-size:14px;font-weight:500;color:var(--text);opacity:.82;white-space:nowrap">Faça sua simulação</a>
        </nav>
        <button id="themeBtn" data-act="toggleTheme" title="Alternar tema" class="hovertheme" style="width:38px;height:38px;border-radius:999px;border:none;background:var(--surface);cursor:pointer;color:var(--text);display:grid;place-items:center;font-size:15px;flex-shrink:0">☾</button>
        <button class="hoverlogin" style="height:38px;padding:0 18px;border-radius:999px;border:none;background:var(--red);cursor:pointer;color:#fff;font-family:inherit;font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;white-space:nowrap"><span>Entrar</span><span class="arrow" style="transition:transform .25s">→</span></button>
      </div>
    </div>
  </header>

  <main id="pageMain"></main>
</div>

<script>
"use strict";
const SB='https://xmnggeptpwxsmcartyzt.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhtbmdnZXB0cHd4c21jYXJ0eXp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NjkzMzIsImV4cCI6MjA5NzE0NTMzMn0.2HWGvTAuEuzEHXcEbOr9t0gC1yc765lxQxk080EDmfg';
const H={apikey:KEY,Authorization:`Bearer ${KEY}`};
const STATUS_LABELS={lancamento:'Lançamento',na_planta:'Na planta',pronto:'Pronto p/ morar',breve_lancamento:'Breve lançamento',em_construcao:'Em construção'};
const q=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=n=>'R$ '+Math.round(n).toLocaleString('pt-BR');
const PLACEHOLDER_IMG='data:image/svg+xml;utf8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10"><rect width="10" height="10" fill="%23EDEBE6"/></svg>');

async function sbFetch(path,params={}){
  const u=new URL(`${SB}/rest/v1/${path}`);
  for(const[k,v]of Object.entries(params))u.searchParams.set(k,v);
  const r=await fetch(u,{headers:{...H,'Range':'0-9999'}});
  return r.json();
}
function fotoUrl(bairroId, idx){ return 'assets/bairros/'+bairroId+'/'+(idx+1)+'.jpg'; }

let B=null, EMPS_HERE=[], STATS={}, LISTING_BAIRRO=null;
const state={theme:'light'};
const ACTIONS={
  toggleTheme(){ state.theme=state.theme==='light'?'dark':'light'; q('root').dataset.theme=state.theme; q('themeBtn').textContent=state.theme==='light'?'☾':'☀'; },
  openEmp(t){ window.location.href='empreendimento.html?id='+encodeURIComponent(t.dataset.id); },
  goListing(){ window.location.href='empreendimentos.html?bairro='+encodeURIComponent(LISTING_BAIRRO||B.nome); },
};
document.addEventListener('click', e=>{
  const t=e.target.closest('[data-act]');
  if(!t) return;
  ACTIONS[t.dataset.act]?.(t,e);
});

function belongsToCanonical(e, targetId){
  // Raw `bairro` exact match against ANY of the 24 canonical neighborhoods
  // takes priority — this must be checked globally, not just against this
  // page's own name list, otherwise a development whose bairro_comercial
  // happens to equal this neighborhood's name (but whose raw bairro belongs
  // to a *different* canonical neighborhood, like Água Rasa under Mooca)
  // would get counted on both pages.
  for(const [cid, names] of Object.entries(BAIRRO_DB_NAMES)){
    if(names.includes(e.bairro)) return cid===targetId;
  }
  return (BAIRRO_DB_NAMES[targetId]||[]).includes(e.bairro_comercial);
}
async function loadData(bairroId){
  const emps=await sbFetch('empreendimentos',{select:'id,nome,bairro,bairro_comercial,status,mes_entrega',ativo:'eq.true',limit:'500'});
  const here=emps.filter(e=>belongsToCanonical(e, bairroId));
  if(!here.length) return {here:[], stats:{count:0}, listingBairro:null};
  // The listing page (empreendimentos.html) filters by bairro_comercial||bairro.
  // A few canonical bairros here (e.g. Vila Zilda) get folded into a bigger
  // neighbor's bairro_comercial, so linking with this bairro's own name would
  // show zero results there — use whichever bairro_comercial value is most
  // common among this group's real developments instead.
  const comercialCounts={};
  here.forEach(e=>{ const v=e.bairro_comercial||e.bairro; comercialCounts[v]=(comercialCounts[v]||0)+1; });
  const listingBairro=Object.entries(comercialCounts).sort((a,b)=>b[1]-a[1])[0][0];
  const ids=here.map(e=>e.id);
  const [tips,imgs]=await Promise.all([
    sbFetch('empreendimento_tipologias',{select:'empreendimento_id,area_m2,preco_a_partir',ativo:'eq.true','empreendimento_id':'in.('+ids.join(',')+')'}),
    sbFetch('empreendimento_imagens',{select:'empreendimento_id,url,tipo,ordem',ativo:'eq.true',tipo:'eq.fachada','empreendimento_id':'in.('+ids.join(',')+')',order:'empreendimento_id,ordem'}),
  ]);
  const tipsBy={}, imgBy={};
  tips.forEach(t=>{ (tipsBy[t.empreendimento_id]=tipsBy[t.empreendimento_id]||[]).push(t); });
  imgs.forEach(i=>{ if(!imgBy[i.empreendimento_id]) imgBy[i.empreendimento_id]=i.url; });
  const enriched=here.map(e=>{
    const et=tipsBy[e.id]||[];
    const precos=et.map(t=>+t.preco_a_partir).filter(p=>p>0);
    const areas=et.map(t=>+t.area_m2).filter(a=>a>0);
    return { id:e.id, nome:e.nome, status:STATUS_LABELS[e.status]||e.status||'—', entrega:e.mes_entrega||'A definir',
      fachada:imgBy[e.id]||null, minPreco: precos.length?Math.min(...precos):0, minArea: areas.length?Math.min(...areas):0,
      precoM2: (precos.length&&areas.length)? (precos.reduce((a,p,i)=>a+p/(areas[i]||areas[0]),0)/precos.length) : 0 };
  });
  const allPrecos=enriched.map(e=>e.minPreco).filter(p=>p>0);
  const allM2=enriched.map(e=>e.precoM2).filter(p=>p>0);
  const stats={
    count: enriched.length,
    ticketMin: allPrecos.length?Math.min(...allPrecos):0,
    precoM2Medio: allM2.length?(allM2.reduce((a,b)=>a+b,0)/allM2.length):0,
  };
  return { here:enriched, stats, listingBairro };
}

function renderPage(){
  const b=B;
  const s=STATS;
  const galeriaFotos=b.fotos.length?b.fotos:[];
  const statsRow=[
    {k:'Empreendimentos', v:s.count||0},
    {k:'Preço médio /m²', v: s.precoM2Medio? fmt(s.precoM2Medio):'—'},
    {k:'Ticket de entrada', v: s.ticketMin? fmt(s.ticketMin):'—'},
    {k:'População', v: b.populacao||'—'},
  ];
  const heroFoto = galeriaFotos.length ? fotoUrl(b.id,0) : null;
  const img2 = galeriaFotos.length>1?fotoUrl(b.id,1):heroFoto;
  const img3 = galeriaFotos.length>2?fotoUrl(b.id,2):(heroFoto);

  const empCards = EMPS_HERE.slice(0,6).map(e=>`
    <div data-act="openEmp" data-id="${e.id}" class="ecard" style="position:relative;height:360px;border-radius:18px;overflow:hidden;background:var(--ph1);cursor:pointer;box-shadow:0 12px 30px -14px rgba(17,17,17,.28)">
      <img src="${esc(e.fachada||PLACEHOLDER_IMG)}" alt="${esc(e.nome)}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block">
      <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.25) 0%,rgba(0,0,0,0) 32%,rgba(0,0,0,.42) 58%,rgba(0,0,0,.9) 100%)"></div>
      <span style="position:absolute;left:12px;top:12px;padding:5px 12px;border-radius:999px;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.28);backdrop-filter:blur(6px);color:#fff;font-size:12px;font-weight:600">${esc(e.status)}</span>
      <div style="position:absolute;left:0;right:0;bottom:0;padding:18px;color:#fff">
        <h3 style="font-size:19px;font-weight:600;letter-spacing:-.01em;line-height:1.15;margin-bottom:8px;text-shadow:0 1px 6px rgba(0,0,0,.5)">${esc(e.nome)}</h3>
        <div style="font-size:12px;opacity:.8">A partir de</div>
        <div style="font-size:19px;font-weight:600;letter-spacing:-.01em;text-shadow:0 1px 6px rgba(0,0,0,.5)">${e.minPreco?fmt(e.minPreco):'Consulte'}</div>
      </div>
    </div>`).join('');

  const creditTag=(f)=>f?`<span class="credit">${esc(f.credit)} · ${esc(f.licenca)}</span>`:'';

  q('pageMain').innerHTML = `
    <div style="position:relative;width:100%;height:100vh;overflow:hidden;background:var(--ph1)">
      ${heroFoto?`<img src="${esc(heroFoto)}" alt="${esc(b.nome)}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">`:`<div style="position:absolute;inset:0;background:linear-gradient(135deg,var(--ph1),var(--ph2))"></div>`}
      <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.45) 0%,rgba(0,0,0,.05) 30%,rgba(0,0,0,.25) 55%,rgba(0,0,0,.9) 100%)"></div>
      <a href="bairros.html" style="position:absolute;top:88px;left:24px;z-index:5;display:flex;align-items:center;gap:7px;height:42px;padding:0 18px;border-radius:999px;border:1px solid rgba(255,255,255,.25);background:rgba(0,0,0,.4);backdrop-filter:blur(8px);color:#fff;font-family:inherit;font-size:14px;font-weight:500">← todos os bairros</a>
      ${galeriaFotos[0]?creditTag(galeriaFotos[0]):''}
      <div style="position:absolute;left:0;right:0;bottom:0;padding:0 24px">
        <div style="max-width:1180px;margin:0 auto;padding:0 0 54px;color:#fff">
          <div style="display:flex;align-items:center;gap:7px;color:var(--gold);font-size:14px;font-weight:600;margin-bottom:10px;text-shadow:0 1px 4px rgba(0,0,0,.5)">◆ ${esc(b.mob)}</div>
          <h1 style="font-size:clamp(38px,6.5vw,80px);font-weight:600;letter-spacing:-.02em;line-height:1;text-shadow:0 2px 14px rgba(0,0,0,.5)">${esc(b.nome)}</h1>
          <p style="font-size:clamp(16px,2vw,20px);opacity:.92;max-width:640px;margin-top:16px;text-shadow:0 1px 6px rgba(0,0,0,.5)">${esc(b.desc)}</p>
        </div>
      </div>
      <div style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.7);font-size:12px;letter-spacing:.1em;text-transform:uppercase;animation:bob 1.8s ease-in-out infinite">↓ conheça o bairro</div>
    </div>

    <div style="max-width:1180px;margin:0 auto;padding:64px 24px 90px">
      <div data-reveal style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:64px">
        ${statsRow.map(s=>{const long=String(s.v).length>14; return `<div style="border:1px solid var(--card-brd);border-radius:16px;padding:22px 20px;background:var(--surface)"><div style="font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px">${esc(s.k)}</div><div class="serif" style="font-size:${long?'15px':'26px'};color:var(--red);line-height:1.3">${esc(s.v)}</div></div>`;}).join('')}
      </div>

      <section data-reveal style="display:grid;grid-template-columns:1.1fr .9fr;gap:44px;align-items:center;margin-bottom:80px">
        <div>
          <div style="color:var(--red);font-weight:600;font-size:13px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px">Sobre o bairro</div>
          <h2 style="font-size:clamp(26px,3.4vw,40px);font-weight:600;letter-spacing:-.02em;line-height:1.08;margin-bottom:18px">Um panorama de <span class="serif" style="color:var(--red)">${esc(b.nome)}</span></h2>
          ${b.texto.map(p=>`<p style="font-size:16px;line-height:1.7;color:var(--text);opacity:.86;margin-bottom:14px">${esc(p)}</p>`).join('')}
        </div>
        <div style="position:relative;height:440px;border-radius:20px;overflow:hidden;background:var(--ph1);box-shadow:var(--shadow)">
          ${heroFoto?`<img src="${esc(heroFoto)}" alt="${esc(b.nome)}" style="width:100%;height:100%;object-fit:cover">`:''}
        </div>
      </section>

      ${galeriaFotos.length?`
      <section data-reveal style="margin-bottom:80px">
        <h2 style="font-size:clamp(24px,3vw,34px);font-weight:600;letter-spacing:-.02em;margin-bottom:20px">Galeria de <span class="serif" style="color:var(--red)">${esc(b.nome)}</span></h2>
        <div style="display:grid;grid-template-columns:repeat(${Math.min(galeriaFotos.length,3)},1fr);gap:14px">
          ${galeriaFotos.map((f,i)=>`<div style="position:relative;height:260px;border-radius:16px;overflow:hidden;background:var(--ph1)"><img src="${esc(fotoUrl(b.id,i))}" alt="${esc(f.alt)}" style="width:100%;height:100%;object-fit:cover">${creditTag(f)}</div>`).join('')}
        </div>
      </section>`:`
      <section data-reveal style="margin-bottom:80px;border:1px solid var(--card-brd);border-radius:20px;background:var(--surface);padding:28px;text-align:center;color:var(--muted)">
        Ainda não encontramos fotos licenciadas específicas deste bairro. Assim que tivermos, a galeria aparece aqui.
      </section>`}

      <section data-reveal style="margin-bottom:72px">
        <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:22px">
          <div>
            <div style="color:var(--red);font-weight:600;font-size:13px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">Disponíveis agora</div>
            <h2 style="font-size:clamp(24px,3vw,34px);font-weight:600;letter-spacing:-.02em">Empreendimentos em <span class="serif" style="color:var(--red)">${esc(b.nome)}</span></h2>
          </div>
          ${EMPS_HERE.length?`<a href="#" data-act="goListing" style="font-size:14.5px;font-weight:600;color:var(--red)">Ver todos →</a>`:''}
        </div>
        ${EMPS_HERE.length?`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px">${empCards}</div>`:`<p style="color:var(--muted)">Nenhum empreendimento ativo neste bairro no momento.</p>`}
      </section>

      <section data-reveal style="border:1px solid var(--card-brd);border-radius:24px;background:var(--surface);padding:48px 40px;text-align:center">
        <h2 style="font-size:clamp(24px,3vw,36px);font-weight:600;letter-spacing:-.02em;margin-bottom:12px">Encontre seu apê em <span class="serif" style="color:var(--red)">${esc(b.nome)}</span></h2>
        <p style="color:var(--muted);font-size:16px;margin-bottom:26px">${s.count||0} empreendimentos disponíveis neste bairro agora.</p>
        <button data-act="goListing" style="height:52px;padding:0 30px;border-radius:13px;border:none;background:var(--red);color:#fff;font-family:inherit;font-weight:600;font-size:15.5px;cursor:pointer" class="btn-red">Ver empreendimentos em ${esc(b.nome)} →</button>
      </section>
    </div>
  `;
  setupReveal();
}

let io=null;
function setupReveal(){
  if(!io){
    io=new IntersectionObserver(entries=>{
      entries.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('reveal-in'); io.unobserve(en.target); } });
    },{threshold:0.1, rootMargin:'0px 0px -6% 0px'});
  }
  document.querySelectorAll('[data-reveal]').forEach(el=>{
    if(el.dataset.revealReady) return;
    el.dataset.revealReady='1';
    el.classList.add('reveal-init');
    io.observe(el);
  });
}

(async function boot(){
  const id=new URLSearchParams(window.location.search).get('id');
  B=BAIRROS_DATA.find(x=>x.id===id);
  if(!B){
    q('loadOverlay').textContent='Bairro não encontrado.';
    return;
  }
  document.title=B.nome+' — Zona Leste Lançamentos';
  try{
    const {here, stats, listingBairro}=await loadData(id);
    EMPS_HERE=here.sort((a,b)=>(b.minPreco?0:1)-(a.minPreco?0:1));
    STATS=stats;
    LISTING_BAIRRO=listingBairro;
  }catch(err){
    console.error(err);
    EMPS_HERE=[]; STATS={count:0};
  }
  renderPage();
  q('loadOverlay').style.display='none';
  q('root').style.display='block';
})();
</script>
</body>
</html>
